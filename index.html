// RENDER ENGINE (vanilla JS — no framework needed)
// ═══════════════════════════════════════════════════════════════
const app = document.getElementById('app');

function showSourceDoc(docIndex) {
  const r = STATE.result;
  if (!r || !r.w2s || !r.w2s[docIndex]) return;
  const w2 = r.w2s[docIndex];
  if (!w2._sourceURL) return;
  openSourceModal('W-2', w2._sourceFileName, w2.employer || 'Unknown employer', w2._sourceURL);
}

function showAllSourceDocs() {
  const r = STATE.result;
  if (!r || !r.w2s) return;
  const idx = r.w2s.findIndex(w => w._sourceURL);
  if (idx >= 0) showSourceDoc(idx);
}

function showInterestSource(idx) {
  const r = STATE.result;
  if (!r || !r.interest || !r.interest[idx]) return;
  const item = r.interest[idx];
  if (!item._sourceURL) return;
  openSourceModal('1099-INT', item._sourceFileName, item.payer || 'Financial Institution', item._sourceURL);
}

function showDividendSource(idx) {
  const r = STATE.result;
  if (!r || !r.dividends || !r.dividends[idx]) return;
  const item = r.dividends[idx];
  if (!item._sourceURL) return;
  openSourceModal('1099-DIV', item._sourceFileName, item.payer || 'Financial Institution', item._sourceURL);
}

function showNECSource() {
  const r = STATE.result;
  if (!r || !r._necSources || r._necSources.length === 0) return;
  const src = r._necSources[0];
  openSourceModal('1099-NEC', src._sourceFileName, 'Nonemployee Compensation', src._sourceURL);
}

function showMortgageSource() {
  const r = STATE.result;
  if (!r || !r._mortgageSources || r._mortgageSources.length === 0) return;
  const src = r._mortgageSources[0];
  openSourceModal('1098', src._sourceFileName, 'Mortgage Interest Statement', src._sourceURL);
}

function showRetirementSource(idx) {
  const r = STATE.result;
  if (!r || !r.retirementDist || !r.retirementDist[idx]) return;
  const item = r.retirementDist[idx];
  if (!item._sourceURL) return;
  openSourceModal('1099-R', item._sourceFileName, item.payer || 'Retirement Distribution', item._sourceURL);
}

function showCapGainSource(idx) {
  const r = STATE.result;
  if (!r || !r.schedules || !r.schedules.form8949 || !r.schedules.form8949[idx]) return;
  const item = r.schedules.form8949[idx];
  if (!item._sourceURL) return;
  openSourceModal('1099-B', item._sourceFileName, item.description, item._sourceURL);
}

function openSourceModal(docType, fileName, subtitle, sourceURL) {
  fileName = fileName || 'Source Document';
  const isImage = /\.(png|jpg|jpeg|gif|bmp|webp|heic)$/i.test(fileName);
  const isPdf = /\.pdf$/i.test(fileName);

  const overlay = document.createElement('div');
  overlay.className = 'source-modal-overlay';
  overlay.id = 'source-modal';
  overlay.onclick = (e) => { if (e.target === overlay) closeSourceDoc(); };

  let bodyContent;
  if (isPdf) {
    bodyContent = `<iframe src="${sourceURL}#toolbar=1"></iframe>`;
  } else if (isImage) {
    bodyContent = `<img src="${sourceURL}" alt="${esc(fileName)}">`;
  } else {
    bodyContent = `<iframe src="${sourceURL}"></iframe>`;
  }

  overlay.innerHTML = `
    <div class="source-modal" role="dialog" aria-modal="true" aria-label="Source document: ${esc(docType)}">
      <div class="source-modal-header">
        <div>
          <div class="title">Source Document: ${docType}</div>
          <div class="filename">${esc(fileName)} — ${esc(subtitle)}</div>
        </div>
        <button class="close-btn" id="source-close-btn" onclick="closeSourceDoc()">Close</button>
      </div>
      <div class="source-modal-body">${bodyContent}</div>
    </div>
  `;
  document.body.appendChild(overlay);
  // Focus the close button and trap focus within modal
  const closeBtn = document.getElementById('source-close-btn');
  if (closeBtn) closeBtn.focus();
  overlay.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeSourceDoc();
  });
}

function closeSourceDoc() {
  const el = document.getElementById('source-modal');
  if (el) el.remove();
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    const changelog = document.getElementById('changelog-modal');
    if (changelog) { changelog.remove(); return; }
    const assumption = document.getElementById('assumption-modal');
    if (assumption) { closeAssumptionModal(); return; }
    const source = document.getElementById('source-modal');
    if (source) { closeSourceDoc(); return; }
  }
});

  else if (STATE.screen === 'parsing') renderParsing();

}

function renderParsing() {
  const pct = STATE.ocrProgress;
  const fileProgress = STATE.ocrTotalFiles > 0 ? `File ${STATE.ocrCurrentFile} of ${STATE.ocrTotalFiles}` : '';
  const docsFound = STATE.parsedDocs.length;
  app.innerHTML = `
    <div class="container">
      <div class="upload-hero">
        <h1>Parsing Your Documents</h1>
        <p>Extracting tax data using PDF.js and Tesseract OCR — all processing happens in your browser</p>
      </div>
      <div class="ocr-progress">
        <div class="ocr-progress-bar"><div class="ocr-progress-fill" style="width:${pct}%"></div></div>
        <div class="ocr-progress-text">
          <span>${fileProgress}</span>
          <span>${docsFound > 0 ? docsFound + ' document' + (docsFound > 1 ? 's' : '') + ' found' : ''}</span>
          <span>${pct}%</span>
        </div>
      </div>
      ${docsFound > 0 ? `
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin:8px 0">
        ${STATE.parsedDocs.map(d => {
          const labels = { w2:'W-2', '1099int':'1099-INT', '1099div':'1099-DIV', '1099nec':'1099-NEC', '1099b':'1099-B', '1099misc':'1099-MISC', '1099r':'1099-R', '1098':'1098', 'ssa1099':'SSA-1099', '1099sa':'1099-SA' };
          return '<span style="padding:3px 8px;background:rgba(34,197,94,0.15);color:var(--green);border-radius:4px;font-size:11px;font-weight:600">' + (labels[d.type] || d.type) + '</span>';
        }).join('')}
      </div>
      ` : ''}
      <div class="ocr-log" id="ocrlog">
        ${STATE.ocrLogs.map(l => `<div class="${l.type || ''}">${l.text}</div>`).join('')}
      </div>
    </div>
  `;
  const log = document.getElementById('ocrlog');
  if (log) log.scrollTop = log.scrollHeight;
}

  const r = STATE.result;
  if (!r) return;

  const answeredCount = STATE.answeredQs.size;

  app.innerHTML = `
    <div class="top-bar">
      <div class="top-bar-left">
        <button class="btn-back" onclick="goBack()">← New Return</button>
        <span style="color:var(--red);font-weight:700;font-size:13px;letter-spacing:2px">DRAFT</span>
        <span style="color:var(--text-muted);font-size:13px">${FS_LABELS[r.filingStatus]} · Tax Year ${TAX.year}</span>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        ${answeredCount > 0 ? `<div class="cost-badge">${answeredCount} refined · $${answeredCount*5}</div>` : ''}
        <button onclick="emailSummary()" style="background:none;border:1px solid var(--border);color:var(--text-muted);border-radius:6px;padding:6px 12px;font-size:13px;cursor:pointer;font-family:inherit" title="Email tax summary">Email</button>
        <button onclick="shareSummary()" style="background:none;border:1px solid var(--border);color:var(--text-muted);border-radius:6px;padding:6px 12px;font-size:13px;cursor:pointer;font-family:inherit" title="Copy summary to clipboard">Share</button>
        <button onclick="downloadSummary()" style="background:none;border:1px solid var(--border);color:var(--text-muted);border-radius:6px;padding:6px 12px;font-size:13px;cursor:pointer;font-family:inherit" title="Download text summary">Text</button>

        <span onclick="showChangelog(); markVersionSeen();" style="color:var(--text-dim);font-size:10px;font-weight:600;cursor:pointer;position:relative" title="Click for changelog">${APP_VERSION}${HAS_NEW_VERSION ? '<span style="position:absolute;top:-4px;right:-8px;width:6px;height:6px;background:var(--green);border-radius:50%"></span>' : ''}</span>
        <button onclick="toggleTheme()" style="background:none;border:1px solid var(--border);color:var(--text-muted);border-radius:6px;padding:6px 10px;font-size:13px;cursor:pointer" title="Toggle light/dark mode">${getTheme() === 'dark' ? '☀️' : '🌙'}</button>
        <span onclick="showDebugLog()" style="color:var(--text-dim);font-size:9px;cursor:pointer;margin-left:4px;opacity:0.5" title="View activity log">log</span>
      </div>
    </div>
    <div class="tabs" role="tablist" aria-label="Tax return sections">
      <button class="tab-btn ${STATE.tab==='return'?'active':''}" onclick="setTab('return')" role="tab" aria-selected="${STATE.tab==='return'}" aria-controls="tab-content">Draft Return</button>
      <button class="tab-btn ${STATE.tab==='assumptions'?'active':''}" onclick="setTab('assumptions')" role="tab" aria-selected="${STATE.tab==='assumptions'}" aria-controls="tab-content">Refine (${r.assumptions.filter(a=>!STATE.answeredQs.has(a.id)).length})</button>
      <button class="tab-btn ${STATE.tab==='documents'?'active':''}" onclick="setTab('documents')" role="tab" aria-selected="${STATE.tab==='documents'}" aria-controls="tab-content">Documents</button>
      <button class="tab-btn ${STATE.tab==='pricing'?'active':''}" onclick="setTab('pricing')" role="tab" aria-selected="${STATE.tab==='pricing'}" aria-controls="tab-content">Pricing</button>
      <button class="tab-btn ${STATE.tab==='compare'?'active':''}" onclick="setTab('compare')" role="tab" aria-selected="${STATE.tab==='compare'}" aria-controls="tab-content">Compare</button>
    </div>
    <div class="container tab-fade-in" role="tabpanel" id="tab-content">
      ${STATE.tab === 'return' ? renderReturn(r) : ''}
      ${STATE.tab === 'assumptions' ? renderAssumptions(r) : ''}
      ${STATE.tab === 'documents' ? renderDocuments(r) : ''}
      ${STATE.tab === 'pricing' ? renderPricing() : ''}
      ${STATE.tab === 'compare' ? renderCompare(r) : ''}
    </div>
  `;

  if (STATE.tab === 'return') {
    const unanswered = r.assumptions.filter(a => !STATE.answeredQs.has(a.id) && getAssumptionForm(a.id)).length;
    if (unanswered > 0) {
      const fab = document.createElement('button');
      fab.className = 'fab-refine';
      fab.innerHTML = '&#x2728; Refine (' + unanswered + ')';
      fab.onclick = () => setTab('assumptions');
      document.body.appendChild(fab);
    }
  }
}

function renderReturn(r) {
  let html = `
    <div style="position:relative">
      <div class="watermark"><div class="watermark-text">DRAFT</div></div>
      <div style="position:relative;z-index:1">
        <div class="disclaimer-box">
          <div class="title">⚠ DRAFT — NOT FOR FILING</div>
          <div class="body">
            This document is a <strong>preliminary draft estimate</strong> for informational and comparison purposes only.
            It does not constitute professional tax advice and has not been reviewed by a licensed CPA or tax attorney.
            The creators and operators accept <strong>no liability</strong> for errors, omissions, or consequences.
            <strong>Do not file this as an actual tax return.</strong> Consult a qualified tax professional.
          </div>
        </div>

        <div class="return-header">
          <div class="draft-label">DRAFT — NOT FOR FILING</div>
          <div class="form-title">U.S. Individual Income Tax Return</div>
          <div class="form-sub">Form 1040 · Tax Year ${TAX.year} · ${FS_LABELS[r.filingStatus]}</div>
        </div>

        <div class="summary-grid">
          <div class="summary-card${r.w2s.some(w=>w._sourceURL) ? ' clickable' : ''}" ${r.w2s.some(w=>w._sourceURL) ? 'onclick="showAllSourceDocs()" style="cursor:pointer"' : ''}>
            <div class="lbl">Total Income</div>
            <div class="val" style="color:var(--text)">$${fmt(r.totalIncome)}</div>
          </div>
          <div class="summary-card">
            <div class="lbl">Total Tax</div>
            <div class="val" style="color:var(--orange)">$${fmt(r.totalTax)}</div>
          </div>
          <div class="summary-card">
            <div class="lbl">${r.refundOrOwed >= 0 ? 'Estimated Refund' : 'Amount Owed'}</div>
            <div class="val" style="color:${r.refundOrOwed>=0?'var(--green)':'var(--red)'}">$${fmt(Math.abs(r.refundOrOwed))}</div>
          </div>
          <div class="summary-card">
            <div class="lbl">Effective Rate</div>
            <div class="val" style="color:var(--accent-light)">${r.effectiveRate.toFixed(1)}%</div>
            <div style="color:var(--text-dim);font-size:10px;margin-top:2px">Marginal: ${r.marginalRate}%</div>
          </div>
        </div>

        ${STATE.originalResult && STATE.answeredQs.size > 0 && STATE.originalResult.refundOrOwed !== r.refundOrOwed ? `
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 16px;margin-bottom:12px">
          <div style="display:flex;justify-content:space-between;align-items:center;font-size:13px">
            <span style="color:var(--text-muted)">Before refinements:</span>
            <span style="color:var(--text-dim)">${STATE.originalResult.refundOrOwed >= 0 ? 'Refund' : 'Owed'}: $${fmt(Math.abs(STATE.originalResult.refundOrOwed))}</span>
          </div>
          <div style="display:flex;justify-content:space-between;align-items:center;font-size:13px;margin-top:4px">
            <span style="color:var(--text)">After ${STATE.answeredQs.size} refinement${STATE.answeredQs.size > 1 ? 's' : ''}:</span>
            <span style="font-weight:700;color:${r.refundOrOwed >= 0 ? 'var(--green)' : 'var(--red)'}">${r.refundOrOwed >= 0 ? 'Refund' : 'Owed'}: $${fmt(Math.abs(r.refundOrOwed))}</span>
          </div>
          ${(() => {
            const diff = r.refundOrOwed - STATE.originalResult.refundOrOwed;
            if (diff === 0) return '';
            return '<div style="text-align:right;margin-top:4px;font-size:12px;color:' + (diff > 0 ? 'var(--green)' : 'var(--red)') + ';font-weight:600">' + (diff > 0 ? '+' : '') + '$' + fmt(diff) + ' change</div>';
          })()}
        </div>
        ` : ''}

        ${r.assumptions.filter(a => !STATE.answeredQs.has(a.id) && getAssumptionForm(a.id)).length > 0 ? `
        <div style="background:linear-gradient(135deg,rgba(59,130,246,0.12),rgba(34,197,94,0.08));border:1px solid var(--accent);border-radius:12px;padding:16px 20px;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center;cursor:pointer" onclick="setTab('assumptions')">
          <div>
            <div style="color:var(--accent-light);font-size:15px;font-weight:700">Your return could be more accurate</div>
            <div style="color:var(--text-muted);font-size:12px;margin-top:4px">${r.assumptions.filter(a => !STATE.answeredQs.has(a.id) && getAssumptionForm(a.id)).length} questions can improve your estimate · $5 per question</div>
            ${(() => {
              const hasDeductions = !STATE.taxData.hsaContribution && !STATE.taxData.iraContribution;
              const hasDependents = !STATE.taxData.dependents;
              const teasers = [];
              if (hasDeductions) teasers.push('HSA/IRA could save you $' + Math.round(r.marginalRate/100 * 7000).toLocaleString());
              if (hasDependents) teasers.push('Each child = $2,000 credit');
              return teasers.length > 0 ? '<div style="color:var(--green);font-size:11px;margin-top:4px;font-weight:600">' + teasers.join(' · ') + '</div>' : '';
            })()}
          </div>
          <button style="background:var(--accent);color:#fff;border:none;border-radius:8px;padding:10px 20px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;box-shadow:0 4px 12px rgba(59,130,246,0.3)">Refine Now</button>
        </div>
        ` : ''}

        ${(() => {
          // Income breakdown mini-chart
          const sources = [];
          if (r.totalWages > 0) sources.push({ label: 'Wages', amount: r.totalWages, color: '#3b82f6' });
          if (r.totalInterest > 0) sources.push({ label: 'Interest', amount: r.totalInterest, color: '#22c55e' });
          if (r.totalOrdDiv > 0) sources.push({ label: 'Dividends', amount: r.totalOrdDiv, color: '#8b5cf6' });
          if (r.schedCNet > 0) sources.push({ label: 'Self-employment', amount: r.schedCNet, color: '#f97316' });
          if ((r.netSTCG + r.netLTCG) > 0) sources.push({ label: 'Capital gains', amount: r.netSTCG + r.netLTCG, color: '#eab308' });
          if (r.schedENet > 0) sources.push({ label: 'Rental', amount: r.schedENet, color: '#06b6d4' });
          if (r.totalRetirement > 0) sources.push({ label: 'Retirement', amount: r.totalRetirement, color: '#ec4899' });
          if (r.ssaTaxable > 0) sources.push({ label: 'Social Security', amount: r.ssaTaxable, color: '#14b8a6' });
          const other = r.totalIncome - sources.reduce((s, x) => s + x.amount, 0);
          if (other > 100) sources.push({ label: 'Other', amount: other, color: '#64748b' });
          if (sources.length <= 1 || r.totalIncome <= 0) return '';
          let html = '<div style="display:flex;align-items:center;gap:16px;margin-bottom:16px;padding:12px;background:var(--surface);border:1px solid var(--border);border-radius:8px;flex-wrap:wrap">';
          // Stacked bar
          html += '<div style="flex:1;min-width:200px;height:24px;border-radius:4px;overflow:hidden;display:flex">';
          sources.forEach(s => {
            const pct = (s.amount / r.totalIncome * 100);
            if (pct >= 1) html += '<div title="' + s.label + ': $' + fmt(s.amount) + ' (' + pct.toFixed(0) + '%)" style="width:' + pct + '%;background:' + s.color + ';height:100%"></div>';
          });
          html += '</div>';
          // Legend

  }

  if (tips.length > 0) {
    html += sectionHeader('Potential Tax Savings', 'Based on your return');
    html += `<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:10px;margin-bottom:16px">`;
    tips.forEach(tip => {
      html += `
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px;cursor:pointer" onclick="setTab('assumptions')">
          <div style="display:flex;gap:8px;align-items:flex-start">
            <div style="font-size:20px;flex-shrink:0">${tip.icon}</div>
            <div>
              <div style="font-size:13px;font-weight:600;color:var(--green)">${tip.title}</div>
              <div style="font-size:11px;color:var(--text-dim);margin-top:4px;line-height:1.4">${tip.text}</div>
            </div>
          </div>
        </div>
      `;
    });
    html += `</div>`;
  }

  // Schedule A
  if (r.schedules.A) {
    const a = r.schedules.A;
    html += sectionHeader('Schedule A — Itemized Deductions', 'Form 1040, Schedule A');
    if (a.medical > 0) {
      html += lineItem('Medical expenses', a.medical, {sub:true});
      html += lineItem(`Less ${TAX.medicalExpenseFloor*100}% of AGI`, -a.medicalThreshold, {sub:true});
      html += lineItem('Medical deduction', a.medicalDeduction, {indent:true});
    }
    html += lineItem(`SALT (capped at $${TAX.saltCap[r.filingStatus].toLocaleString()})`, a.saltDeduction, {indent:true});
    if (a.mortgageInterest > 0) html += lineItem('Mortgage interest', a.mortgageInterest, {indent:true, onClick: r._mortgageSources && r._mortgageSources.length > 0 ? 'showMortgageSource()' : ''});
    if (a.charitableCash > 0) html += lineItem('Charitable (cash)', a.charitableCash, {indent:true});
    if (a.charitableNonCash > 0) html += lineItem('Charitable (non-cash)', a.charitableNonCash, {indent:true});
    html += lineItem('Total Itemized Deductions', a.totalItemized, {bold:true});
  }

  // Schedule B
  if (r.schedules.B) {
    const b = r.schedules.B;
    html += sectionHeader('Schedule B — Interest and Dividends', 'Form 1040, Schedule B');
    b.interestItems.forEach((item, idx) => { html += lineItem('  ' + esc(item.payer), item.amount, {sub:true, onClick: item._sourceURL ? 'showInterestSource('+idx+')' : ''}); });
    html += lineItem('Total interest', b.totalInterest, {indent:true});
    b.dividendItems.forEach((item, idx) => { html += lineItem('  ' + esc(item.payer), item.ordinary, {sub:true, onClick: item._sourceURL ? 'showDividendSource('+idx+')' : ''}); });
    html += lineItem('Total ordinary dividends', b.totalOrdDiv, {indent:true});
  }

  // Schedule C
  if (r.schedules.C) {
    const c = r.schedules.C;
    html += sectionHeader(`Schedule C — ${c.businessName}`, 'Form 1040, Schedule C');
    html += lineItem('Gross receipts', c.grossReceipts);
    if (c.cogs > 0) html += lineItem('Cost of goods sold', -c.cogs);
    html += lineItem('Gross income', c.grossIncome);
    html += lineItem('Total expenses', c.totalExpenses);
    html += lineItem('Net profit', c.netProfit, {bold:true});
  }

  // Schedule SE
  if (r.schedules.SE) {
    const se = r.schedules.SE;
    html += sectionHeader('Schedule SE — Self-Employment Tax', 'Form 1040, Schedule SE');
    html += lineItem('Net SE earnings (92.35%)', se.netEarnings);
    html += lineItem('Social Security tax', se.ssTax, {indent:true});
    html += lineItem('Medicare tax', se.medicareTax, {indent:true});
    if (se.additionalMedicare > 0) html += lineItem('Additional Medicare tax', se.additionalMedicare, {indent:true});
    html += lineItem('Total SE tax', se.totalSETax, {bold:true});
    html += lineItem('Deductible portion (½)', se.deduction, {sub:true});
  }

  // Schedule E
  if (r.schedules.E) {
    html += sectionHeader('Schedule E — Rental Income', 'Supplemental Income');
    r.schedules.E.properties.forEach((p, i) => {
      html += lineItem(esc(p.description) || 'Property ' + (i+1) + ' gross rents', p.rents);
      const exp = (p.mortgage||0)+(p.taxes||0)+(p.insurance||0)+(p.repairs||0)+(p.depreciation||0)+(p.utilities||0);
      if (exp > 0) html += lineItem('   Total expenses', exp, {sub:true});
      html += lineItem('   Net income', p._netIncome, {sub:true, showSign:true});
    });
    html += lineItem('Total Schedule E', r.schedules.E.totalNet, {bold:true, showSign:true});
  }

  // Schedule D
  if (r.schedules.D) {
    const d = r.schedules.D;
    html += sectionHeader('Schedule D — Capital Gains and Losses', 'Form 1040, Schedule D');
    html += `<div style="font-size:13px;color:var(--text-muted);margin-bottom:8px">Part I — Short-Term</div>`;
    html += lineItem('Net short-term gain/loss', d.netSTCG, {showSign:true});
    html += `<div style="font-size:13px;color:var(--text-muted);margin:8px 0">Part II — Long-Term</div>`;
    html += lineItem('Net long-term gain/loss', d.netLTCG, {showSign:true});
    html += lineItem('Total net gain/loss', d.totalNetGain, {bold:true, showSign:true});
    if (d.capitalLossCarryover > 0) html += lineItem('Capital loss carryforward to 2026', d.capitalLossCarryover, {sub:true});
  }

  // Form 8824 — Like-Kind Exchange
  if (r.schedules.form8824) {
    const ex = r.schedules.form8824;
    html += sectionHeader('Form 8824 — Like-Kind Exchange (1031)', 'Form 8824');
    if (ex.description) html += `<div class="line-item sub"><span style="color:var(--text-muted);font-style:italic">${esc(ex.description)}</span><span></span></div>`;
    html += lineItem('FMV of relinquished property', ex.relinquishedFMV);
    html += lineItem('Adjusted basis', ex.relinquishedBasis, {sub:true});
    html += lineItem('Realized gain', ex.realizedGain, {bold:true});
    html += lineItem('FMV of replacement property', ex.replacementFMV);
    if (ex.bootReceived > 0) html += lineItem('Boot received (cash/other)', ex.bootReceived, {sub:true});
    if (ex.bootPaid > 0) html += lineItem('Boot paid', ex.bootPaid, {sub:true});
    html += lineItem('Recognized gain (taxable)', ex.recognizedGain, {bold:true, showSign:true});
    html += lineItem('Deferred gain', ex.deferredGain, {sub:true, color:'var(--green)'});
  }

  // Form 8949
  if (r.schedules.form8949) {
    html += sectionHeader('Form 8949 — Sales of Capital Assets', 'Form 8949');
    html += `<div style="overflow-x:auto"><table class="form8949-table"><thead><tr>
      <th>Description</th><th>Acquired</th><th>Sold</th>
      <th class="right">Proceeds</th><th class="right">Basis</th><th class="right">Gain/Loss</th><th class="center">Term</th>
    </tr></thead><tbody>`;
    r.schedules.form8949.forEach((t, idx) => {
      const gl = (t.proceeds||0) - (t.basis||0);
      const rowClick = t._sourceURL ? ` style="cursor:pointer" onclick="showCapGainSource(${idx})" title="Click to view source document"` : '';
      html += `<tr${rowClick}>
        <td>${esc(t.description)}${t._sourceURL ? ' <span style="color:var(--accent-light);font-size:10px">&#8599;</span>' : ''}</td><td class="muted">${t.dateAcquired}</td><td class="muted">${t.dateSold}</td>
        <td class="right">$${fmt(t.proceeds)}</td><td class="right">$${fmt(t.basis)}</td>
        <td class="right">${moneyHtml(gl, true)}</td>
        <td class="center">${t.longTerm ? 'LT' : 'ST'}</td>
      </tr>`;
    });
    html += `</tbody></table></div>`;
  }

  // Estimated Quarterly Payments (for next year, if owing tax)
  if (r.refundOrOwed < -500 || r.seTax > 0) {
    const safeHarbor = Math.max(r.totalTax, Math.round(r.totalTax * 1.1)); // 110% safe harbor for high income
    const quarterlyAmount = Math.ceil((safeHarbor - r.totalFedWithheld) / 4);
    if (quarterlyAmount > 0) {
      const nextYear = TAX.year + 1;
      const quarters = [
        { label: 'Q1', date: `Apr 15, ${nextYear+1}`, due: new Date(nextYear+1, 3, 15) },
        { label: 'Q2', date: `Jun 16, ${nextYear+1}`, due: new Date(nextYear+1, 5, 16) },
        { label: 'Q3', date: `Sep 15, ${nextYear+1}`, due: new Date(nextYear+1, 8, 15) },
        { label: 'Q4', date: `Jan 15, ${nextYear+2}`, due: new Date(nextYear+2, 0, 15) },
      ];
      const now = new Date();
      html += sectionHeader('Estimated Quarterly Payments', `${nextYear+1} Tax Year`);
      html += `<div style="font-size:12px;color:var(--text-muted);margin-bottom:8px">
        Based on this year's tax, you may need to make estimated payments to avoid underpayment penalties.
      </div>`;
      html += `<div class="quarterly-grid">`;
      quarters.forEach(q => {
        const isPast = q.due < now;
        const isNext = !isPast && !quarters.some(q2 => q2.due < q.due && q2.due >= now);
        html += `<div class="quarterly-card${isPast ? ' past' : ''}${isNext ? ' next' : ''}">
          <div class="q-label">${q.label}${isNext ? ' — NEXT' : ''}</div>
          <div class="q-amount">$${fmt(quarterlyAmount)}</div>
          <div class="q-date">${q.date}</div>
        </div>`;
      });
      html += `</div>`;
      html += `<div style="font-size:11px;color:var(--text-dim);margin-top:6px">
        Safe harbor: $${fmt(safeHarbor)} total · $${fmt(quarterlyAmount)} × 4 = $${fmt(quarterlyAmount * 4)}
      </div>`;
    }
  }

  // Important Notices (personalized alerts)
  const notices = [];
  if (r.refundOrOwed < -1000) {
    notices.push({ icon: '&#x26a0;&#xfe0f;', color: 'var(--red)', title: 'You may owe a penalty', text: `You owe $${fmt(Math.abs(r.refundOrOwed))}. If you didn't make estimated payments, you could face an underpayment penalty. Consider paying by April 15.` });
  }
  if (r.totalWages > TAX.ssWageBase) {
    notices.push({ icon: '&#x1f4b5;', color: 'var(--accent-light)', title: 'Social Security wage cap reached', text: `Your wages ($${fmt(r.totalWages)}) exceed the SS wage base ($${fmt(TAX.ssWageBase)}). No Social Security tax on earnings above this amount.` });
  }
  if (r.niit > 0) {
    notices.push({ icon: '&#x1f4c8;', color: 'var(--orange)', title: 'Net Investment Income Tax applies', text: `You owe $${fmt(r.niit)} in NIIT (3.8%) on investment income above the threshold. This is in addition to regular income tax.` });
  }
  if (r.amt > 0) {
    notices.push({ icon: '&#x1f6a8;', color: 'var(--red)', title: 'Alternative Minimum Tax triggered', text: `Your AMT is $${fmt(r.amt)}. This typically affects high-income taxpayers with large deductions or incentive stock options.` });
  }
  if (r.schedules.D && r.schedules.D.capitalLossCarryover > 0) {
    notices.push({ icon: '&#x1f4ca;', color: 'var(--accent-light)', title: 'Capital loss carryforward', text: `You have $${fmt(r.schedules.D.capitalLossCarryover)} in unused capital losses carrying forward to ${TAX.year + 1}. These will offset future gains.` });
  }
  if (r.schedules['3'] && r.schedules['3'].eitcCredit > 0) {
    notices.push({ icon: '&#x2705;', color: 'var(--green)', title: 'Earned Income Credit applies', text: `You qualify for $${fmt(r.schedules['3'].eitcCredit)} in EITC. This is a refundable credit — you get it even if you owe no tax.` });
  }
  if (notices.length > 0) {
    html += sectionHeader('Important Notices', 'Based on your return');
    html += `<div style="display:grid;gap:8px;margin-bottom:16px">`;
    notices.forEach(n => {
      html += `<div style="padding:12px 16px;background:var(--surface);border-left:3px solid ${n.color};border-radius:0 8px 8px 0;display:flex;gap:10px;align-items:flex-start">
        <div style="font-size:18px;flex-shrink:0">${n.icon}</div>
        <div><div style="font-size:13px;font-weight:700;color:${n.color}">${n.title}</div>
        <div style="font-size:12px;color:var(--text-muted);margin-top:2px;line-height:1.4">${n.text}</div></div>
      </div>`;
    });
    html += `</div>`;
  }

  // Next Steps
  const unansweredCount = r.assumptions.filter(a => !STATE.answeredQs.has(a.id) && getAssumptionForm(a.id)).length;
  html += `
    ${sectionHeader('What You Can Do Next', '')}
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:24px">
      ${unansweredCount > 0 ? `
      <div class="assumption-card" style="cursor:pointer;text-align:center" onclick="setTab('assumptions')">
        <div style="flex:1">
          <div style="font-size:24px;margin-bottom:6px">&#x270F;&#xFE0F;</div>
          <div style="font-size:13px;font-weight:600;color:var(--accent-light)">Refine Your Return</div>
          <div style="font-size:11px;color:var(--text-dim);margin-top:4px">${unansweredCount} question${unansweredCount>1?'s':''} can improve accuracy</div>
        </div>
      </div>` : ''}
      <a href="schedules.html" class="assumption-card" style="cursor:pointer;text-align:center;text-decoration:none">
        <div style="flex:1">
          <div style="font-size:24px;margin-bottom:6px">&#x1F4DD;</div>
          <div style="font-size:13px;font-weight:600;color:var(--accent-light)">Edit Schedules</div>
          <div style="font-size:11px;color:var(--text-dim);margin-top:4px">Schedule C, D, E, A & Form 8824</div>
        </div>
      </a>
      <div class="assumption-card" style="cursor:pointer;text-align:center" onclick="setTab('documents')">
        <div style="flex:1">
          <div style="font-size:24px;margin-bottom:6px">&#x1F4C4;</div>
          <div style="font-size:13px;font-weight:600;color:var(--accent-light)">View Documents</div>
          <div style="font-size:11px;color:var(--text-dim);margin-top:4px">Review uploaded source documents</div>
        </div>
      </div>
      <div class="assumption-card" style="cursor:pointer;text-align:center" onclick="window.print()">
        <div style="flex:1">
          <div style="font-size:24px;margin-bottom:6px">&#x1F5A8;&#xFE0F;</div>
          <div style="font-size:13px;font-weight:600;color:var(--accent-light)">Print This Draft</div>
          <div style="font-size:11px;color:var(--text-dim);margin-top:4px">Save as PDF or print for your records</div>
        </div>
      </div>
      <div class="assumption-card" style="cursor:pointer;text-align:center" onclick="showTaxCalendar()">
        <div style="flex:1">
          <div style="font-size:24px;margin-bottom:6px">&#x1f4c5;</div>
          <div style="font-size:13px;font-weight:600;color:var(--accent-light)">Key Tax Dates</div>
          <div style="font-size:11px;color:var(--text-dim);margin-top:4px">Filing deadlines & payment schedule</div>
        </div>
      </div>
      <div class="assumption-card" style="cursor:pointer;text-align:center" onclick="goBack()">
        <div style="flex:1">
          <div style="font-size:24px;margin-bottom:6px">&#x1F504;</div>
          <div style="font-size:13px;font-weight:600;color:var(--accent-light)">Start Over</div>
          <div style="font-size:11px;color:var(--text-dim);margin-top:4px">Upload different documents</div>
        </div>
      </div>
    </div>
  `;

  // Footer
  html += `
        <div class="footer-disclaimer">
          <div class="title">⚠ THIS IS A DRAFT ESTIMATE — NOT AN OFFICIAL TAX RETURN ⚠</div>
          This document was generated by automated software and has not been reviewed by a licensed tax professional.
          It is intended solely for informational, comparison, and educational purposes. The creators and operators
          are not licensed CPAs, enrolled agents, or tax attorneys. They assume no liability for accuracy, omissions,
          or consequences. Federal and state tax law is complex and changes frequently. Do not file this document
          with the IRS or any state tax authority. If you choose to transcribe data onto official forms, you do so
          at your own risk. Always consult a qualified tax professional before filing. By using this tool, you
          acknowledge the operators bear no responsibility for errors or resulting tax liabilities.
          <div class="version">Tax Year ${TAX.year} · Generated ${new Date().toLocaleDateString()} · ${APP_VERSION}
            · <a href="${GITHUB_ISSUES}" target="_blank" rel="noopener" style="color:var(--accent-light);text-decoration:none">Report a bug</a>
          </div>
          <div style="margin-top:6px"><a href="${GITHUB_REPO}" target="_blank" rel="noopener" style="color:var(--accent-light);text-decoration:none;font-weight:600">
            <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor" style="vertical-align:-1px;margin-right:3px"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
            Open source — verify every line of code on GitHub
          </a></div>
        </div>
      </div>
    </div>
  `;
  return html;
}

function renderAssumptions(r) {
  const unanswered = r.assumptions.filter(a => !STATE.answeredQs.has(a.id));
  const answeredList = r.assumptions.filter(a => STATE.answeredQs.has(a.id));
  const answeredCount = STATE.answeredQs.size;
  const statusText = PAID_QUESTIONS > 0
    ? '1 question ready to use'
    : answeredCount === 0
      ? '$5 per question to refine your return'
      : 'Pay $5 to refine another question';

  let html = `
    <div style="margin-bottom:16px">
      <h2 style="font-size:18px;font-weight:700">Assumptions & Questions</h2>
      <p style="color:var(--text-muted);font-size:13px;margin-top:4px">
        Your draft return made these assumptions. Refine them to get a more accurate estimate.
      </p>
      <div style="margin-top:10px;padding:10px 14px;background:rgba(59,130,246,0.08);border:1px solid var(--accent);border-radius:8px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">
        <div>
          <div style="color:var(--accent-light);font-size:14px;font-weight:700">$5 per question</div>
          <div style="color:var(--text-muted);font-size:11px;margin-top:2px">${statusText}</div>
        </div>
        <div style="color:var(--accent-light);font-size:20px;font-weight:800">$5</div>
      </div>
      ${answeredCount > 0 ? `<div style="margin-top:8px;padding:8px 12px;background:rgba(34,197,94,0.08);border:1px solid var(--green-dark);border-radius:6px;font-size:12px;color:var(--green)">
        &#x2713; ${answeredCount} assumption${answeredCount>1?'s':''} refined · Return recalculated
      </div>` : ''}
    </div>
    <div class="refine-progress">
      ${r.assumptions.filter(a => getAssumptionForm(a.id)).map((a, i) => {
        const done = STATE.answeredQs.has(a.id);
        const nextUnanswered = !done && !r.assumptions.filter(a2 => getAssumptionForm(a2.id)).slice(0, i).some(a2 => !STATE.answeredQs.has(a2.id));
        return `<div class="refine-dot ${done ? 'complete' : (nextUnanswered ? 'current' : '')}" title="${a.text.substring(0, 60)}"></div>`;
      }).join('')}
    </div>
  `;

  if (unanswered.length > 0) {
    html += `<div style="color:var(--text-dim);font-size:12px;margin-bottom:8px;font-weight:600">Needs your input (${unanswered.length})</div>`;
    unanswered.forEach((a, i) => {
      const canInteract = getAssumptionForm(a.id) !== null;
      const needsPayment = canInteract && PAID_QUESTIONS <= 0 && STRIPE_PAYMENT_LINKS.per_question;
      const hintMap = {
        'filing_status': 'Changing filing status can save thousands',
        'dependents': 'Child Tax Credit = $2,000 per qualifying child',
        'no_hsa': 'HSA/IRA = up to $15,550 off your taxable income',
        'select_state': 'See your state tax refund or amount owed'
      };
      const hint = hintMap[a.id] || '';
      html += `
        <div class="assumption-card">
          <div style="flex:1">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
              <span class="impact-badge ${a.impact}">${a.impact} impact</span>
              ${canInteract ? '<span style="color:var(--accent-light);font-size:10px;font-weight:600">INTERACTIVE</span>' : ''}
            </div>
            <div class="assumption-text">${a.text}</div>
            ${hint ? '<div style="color:var(--green);font-size:11px;margin-top:4px;font-weight:600">' + hint + '</div>' : ''}
          </div>
          <button class="btn-answer" onclick="answerQuestion('${a.id}')" style="${canInteract ? 'padding:8px 16px;font-size:13px' : ''}${needsPayment ? ';background:var(--green)' : ''}">
            ${!canInteract ? 'OK' : needsPayment ? 'Pay $5 → Refine' : 'Refine'}
          </button>
        </div>
      `;
    });
  }

  if (answeredList.length > 0) {
    html += `<div style="color:var(--text-dim);font-size:12px;margin:16px 0 8px;font-weight:600">Already refined (${answeredList.length})</div>`;
    answeredList.forEach(a => {
      html += `
        <div class="assumption-card answered">
          <div style="flex:1">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
              <span class="impact-badge ${a.impact}">${a.impact} impact</span>
              <span class="answered-label">&#x2713; Refined</span>
            </div>
            <div class="assumption-text">${a.text}</div>
          </div>
          <button class="btn-answer" style="background:var(--surface-light)" onclick="answerQuestion('${a.id}')">Edit</button>
        </div>
      `;
    });
  }

  return html;
}

function renderPricing() {
  const stripeReady = stripeInstance !== null;
  const answered = STATE.answeredQs.size;

  return `
    <h2 style="font-size:18px;font-weight:700">How It Works</h2>
    <p style="color:var(--text-muted);font-size:13px;margin-top:4px;margin-bottom:20px">
      Get a free draft return, then refine it by answering questions about your specific situation.
    </p>

    <!-- Value Proposition -->
    <div style="background:linear-gradient(135deg,rgba(59,130,246,0.08),rgba(34,197,94,0.08));border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:24px">
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px;text-align:center">
        <div>
          <div style="font-size:28px;font-weight:800;color:var(--green)">Free</div>
          <div style="color:var(--text-muted);font-size:12px;margin-top:4px">Draft return with all schedules</div>
        </div>

function addFiles(fileList) {
  const validTypes = ['application/pdf', 'image/jpeg', 'image/png', 'image/tiff', 'image/bmp', 'image/gif', 'image/webp'];
  const validExts = ['.pdf', '.jpg', '.jpeg', '.png', '.tiff', '.tif', '.bmp', '.gif', '.webp'];
  const MAX_FILE_SIZE = 50 * 1024 * 1024; // 50MB
  let skipped = 0, tooLarge = 0, dupes = 0;
  const existingNames = new Set(STATE.files.map(f => f.name + '_' + f.size));
  for (const f of fileList) {
    const ext = '.' + f.name.split('.').pop().toLowerCase();
    if (!validTypes.includes(f.type) && !validExts.includes(ext)) {
      skipped++;
    } else if (f.size > MAX_FILE_SIZE) {
      tooLarge++;
    } else if (existingNames.has(f.name + '_' + f.size)) {
      dupes++;
    } else {
      STATE.files.push(f);
      existingNames.add(f.name + '_' + f.size);
    }
  }
  const msgs = [];
  if (skipped > 0) msgs.push(`${skipped} unsupported format`);
  if (tooLarge > 0) msgs.push(`${tooLarge} over 50MB limit`);
  if (dupes > 0) msgs.push(`${dupes} duplicate`);
  if (msgs.length > 0) {
    showToast(`Skipped: ${msgs.join(', ')}`, 'error');
  }
  render();
}

function removeFile(i) {
  STATE.files.splice(i, 1);
  render();
}

async function startParsing() {
  rlog('START_PARSING', { fileCount: STATE.files.length, fileNames: STATE.files.map(f => f.name).join(', ') });
  STATE.screen = 'parsing';
  STATE.ocrLogs = [];
  STATE.ocrProgress = 0;
  STATE.ocrCurrentFile = 0;
  STATE.ocrTotalFiles = STATE.files.length;
  STATE.parsedDocs = [];

  render();

  const parser = new TaxDocumentParser(
    (text) => {
      const isHighlight = text.includes('Detected:') || text.includes('$');
      const isWarn = text.includes('⚠');
      STATE.ocrLogs.push({ text, type: isHighlight ? 'highlight' : (isWarn ? 'warn' : '') });
      render();
    },
    (pct) => {
      STATE.ocrProgress = pct;
      render();
    }
  );

  for (let i = 0; i < STATE.files.length; i++) {
    STATE.ocrCurrentFile = i + 1;
    STATE.ocrProgress = 0;
    render();
    try {
      const doc = await parser.parseFile(STATE.files[i]);
      if (doc) {
        doc._sourceURL = URL.createObjectURL(STATE.files[i]);
        doc._sourceFileName = STATE.files[i].name;
        STATE.parsedDocs.push(doc);
      }
    } catch (err) {
      const msg = err && err.message ? err.message : String(err);
      STATE.ocrLogs.push({ text: `Error parsing ${STATE.files[i].name}: ${msg}`, type: 'warn' });
      if (STATE.files[i].name.toLowerCase().endsWith('.pdf')) {
        STATE.ocrLogs.push({ text: 'Tip: If this PDF is password-protected or encrypted, try exporting it as an unprotected PDF first.', type: 'warn' });
      }
      render();
    }
  }

  STATE.ocrLogs.push({ text: `\nParsing complete — ${STATE.parsedDocs.length} document(s) processed`, type: 'highlight' });
  STATE.ocrProgress = 100;
  render();

  // Small delay then show results
  setTimeout(() => {
    if (STATE.parsedDocs.length > 0) {
      STATE.taxData = aggregateParsedDocs(STATE.parsedDocs);
      STATE.result = safeCompute(STATE.taxData);
      STATE.originalResult = { ...STATE.result };
      STATE.screen = 'review';
      STATE.tab = 'return';
      STATE.answeredQs = new Set();
    } else {
      STATE.ocrLogs.push({ text: 'No tax data could be extracted from your files.', type: 'warn' });
      STATE.ocrLogs.push({ text: 'Tips: Make sure your PDFs are W-2s, 1099s, or 1098s.', type: 'warn' });
      STATE.ocrLogs.push({ text: 'Scanned/image PDFs may take longer. Try a clear, high-resolution scan.', type: '' });
      STATE.ocrLogs.push({ text: 'You can also try a demo scenario below to see how the app works.', type: '' });
      render();
      // Show a more helpful "no documents" screen with retry and demo buttons
      const app = document.getElementById('app');
      if (app) {
        app.innerHTML += `
          <div class="container" style="text-align:center;padding-top:0">
            <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:16px">
              <button class="btn-primary" onclick="goBack()" style="background:var(--accent)">Try Different Files</button>
              <button class="btn-primary" onclick="loadDemo('simple_w2')" style="background:var(--green)">Try Sample Data Instead</button>
            </div>
          </div>`;
      }
      showToast('No tax documents detected', 'error');
    }
    render();
  }, 1500);
}

async function handleAdditionalUpload(event) {
  const files = event.target.files;
  if (!files || files.length === 0) return;

  // Check payment gate
  const uploadKey = 'upload_additional_' + Date.now();
  if (!STATE.answeredQs.has(uploadKey)) {
    if (PAID_QUESTIONS <= 0 && STRIPE_PAYMENT_LINKS.per_question) {
      saveTaxData(); // Persist state before leaving for payment
      window.location.href = STRIPE_PAYMENT_LINKS.per_question;
      return;

    if (PAID_QUESTIONS > 0) {
      PAID_QUESTIONS--;
      try {
        const payment = JSON.parse(localStorage.getItem('rmt_payment') || '{}');
        payment.usedQuestions = (payment.usedQuestions || 0) + 1;
        localStorage.setItem('rmt_payment', JSON.stringify(payment));
      } catch(e) { rlog('ERROR', e.message); }
    }
    STATE.answeredQs.add(uploadKey);
    saveAnswered();
  }

  // Parse new documents
  const parser = new TaxDocumentParser(
    (msg) => console.log('[Additional upload]', msg),
    () => {}
  );

  const newDocs = [];
  for (const file of files) {
    try {
      const result = await parser.parseFile(file);
      if (result) {
        result._sourceURL = URL.createObjectURL(file);
        result._sourceFileName = file.name;
        newDocs.push(result);
      }
    } catch(e) {
      console.error('Error parsing additional file:', e);
    }
  }

  if (newDocs.length === 0) {
    showToast('Could not parse any documents', 'error');
    return;
  }

  // Merge new docs into existing tax data
  const newAgg = aggregateParsedDocs(newDocs);

  // Merge W-2s
  if (newAgg.w2s) STATE.taxData.w2s = (STATE.taxData.w2s || []).concat(newAgg.w2s);
  // Merge interest
  if (newAgg.interest) STATE.taxData.interest = (STATE.taxData.interest || []).concat(newAgg.interest);
  // Merge dividends
  if (newAgg.dividends) STATE.taxData.dividends = (STATE.taxData.dividends || []).concat(newAgg.dividends);
  // Merge capital gains
  if (newAgg.capitalGains) STATE.taxData.capitalGains = (STATE.taxData.capitalGains || []).concat(newAgg.capitalGains);
  // Merge retirement
  if (newAgg.retirementDist) STATE.taxData.retirementDist = (STATE.taxData.retirementDist || []).concat(newAgg.retirementDist);
  // Merge Schedule C
  if (newAgg.scheduleC && !STATE.taxData.scheduleC) STATE.taxData.scheduleC = newAgg.scheduleC;
  else if (newAgg.scheduleC && STATE.taxData.scheduleC) {
    STATE.taxData.scheduleC.grossReceipts += newAgg.scheduleC.grossReceipts;
  }
  // Merge SSA
  if (newAgg.ssaBenefits) STATE.taxData.ssaBenefits = (STATE.taxData.ssaBenefits || 0) + newAgg.ssaBenefits;
  if (newAgg.ssaWithheld) STATE.taxData.ssaWithheld = (STATE.taxData.ssaWithheld || 0) + newAgg.ssaWithheld;
  // Merge itemized if new 1098 found
  if (newAgg.itemized) {
    if (!STATE.taxData.itemized) STATE.taxData.itemized = newAgg.itemized;
    else {
      STATE.taxData.itemized.mortgageInterest = (STATE.taxData.itemized.mortgageInterest||0) + (newAgg.itemized.mortgageInterest||0);
      STATE.taxData.itemized.propertyTaxes = (STATE.taxData.itemized.propertyTaxes||0) + (newAgg.itemized.propertyTaxes||0);
    }
  }
  // Auto-detect state from new W-2s if not already set
  if (!STATE.taxData.stateCode) {
    const w2WithState = (newAgg.w2s||[]).find(w => w.stateCode);
    if (w2WithState) STATE.taxData.stateCode = w2WithState.stateCode;
  }

  // Recalculate
  STATE.result = safeCompute(STATE.taxData);
  showToast(`Added ${newDocs.length} document${newDocs.length > 1 ? 's' : ''} — return recalculated`, 'success');
  STATE.tab = 'return';
  render();
}

async function handle1031Upload(event) {
  const files = event.target.files;
  if (!files || files.length === 0) return;

  // Each 1031 document upload costs $5
  for (let i = 0; i < files.length; i++) {
    const docKey = '1031_doc_' + Date.now() + '_' + i;
    if (!STATE.answeredQs.has(docKey)) {
      if (PAID_QUESTIONS <= 0 && STRIPE_PAYMENT_LINKS.per_question) {
        saveTaxData(); // Persist state before leaving for payment
      window.location.href = STRIPE_PAYMENT_LINKS.per_question;
        return;
      }
      if (PAID_QUESTIONS > 0) {
        PAID_QUESTIONS--;
        try {
          const payment = JSON.parse(localStorage.getItem('rmt_payment') || '{}');
          payment.usedQuestions = (payment.usedQuestions || 0) + 1;
          localStorage.setItem('rmt_payment', JSON.stringify(payment));
        } catch(e) { rlog('ERROR', e.message); }
      }
      STATE.answeredQs.add(docKey);
      saveAnswered();
    }
  }

  // Store file references for display
  if (!STATE.exchange1031Docs) STATE.exchange1031Docs = [];
  for (const file of files) {
    STATE.exchange1031Docs.push({ name: file.name, url: URL.createObjectURL(file) });
  }

  // Update the docs list in the modal if still open
  const docsList = document.getElementById('1031-docs-list');
  if (docsList) {
    docsList.innerHTML = STATE.exchange1031Docs.map(d =>
      '<div style="padding:4px 0;border-bottom:1px solid var(--border)"><a href="' + d.url + '" target="_blank" style="color:var(--accent-light)">' + esc(d.name) + '</a></div>'
    ).join('');
  }

  showToast(files.length + ' document' + (files.length > 1 ? 's' : '') + ' uploaded for 1031 exchange', 'success');
}

function goBack() {
  // Revoke object URLs to free memory
  if (STATE.result) {
    const r = STATE.result;
    (r.w2s||[]).forEach(w => { if (w._sourceURL) URL.revokeObjectURL(w._sourceURL); });
    (r.interest||[]).forEach(i => { if (i._sourceURL) URL.revokeObjectURL(i._sourceURL); });
    (r.dividends||[]).forEach(d => { if (d._sourceURL) URL.revokeObjectURL(d._sourceURL); });
    (r._necSources||[]).forEach(s => { if (s._sourceURL) URL.revokeObjectURL(s._sourceURL); });
    (r._mortgageSources||[]).forEach(s => { if (s._sourceURL) URL.revokeObjectURL(s._sourceURL); });
    if (r.schedules && r.schedules.form8949) {
      r.schedules.form8949.forEach(t => { if (t._sourceURL) URL.revokeObjectURL(t._sourceURL); });
    }
  }
  STATE.screen = 'upload';
  STATE.files = [];
  STATE.parsedDocs = [];
  // Clear persisted state
  localStorage.removeItem('rmt_taxData');
  localStorage.removeItem('rmt_screen');
  localStorage.removeItem('rmt_answered');
  STATE.taxData = null;
  STATE.result = null;
  STATE.answeredQs = new Set();
  STATE.originalResult = null;
  render();
}

function clearAllData() {
  if (!confirm('This will erase all your tax data, preferences, and payment credits from this browser. Continue?')) return;
  rlog('CLEAR_ALL_DATA', 'user requested');
  const keys = Object.keys(localStorage).filter(k => k.startsWith('rmt_'));
  keys.forEach(k => localStorage.removeItem(k));
  goBack();
  showToast('All data cleared from your browser', 'success');
}

function setTab(t) {
  rlog('TAB_CHANGE', t);
  STATE.tab = t;
  render();
}

function runScenario(scenarioId) {
  // Check payment gate — comparisons count as questions (but don't charge for re-runs)
  var compareKey = 'compare_' + scenarioId;
  if (!STATE.answeredQs.has(compareKey)) {
    if (PAID_QUESTIONS <= 0) {
      if (STRIPE_PAYMENT_LINKS.per_question) {
        localStorage.setItem('rmt_pending_question', compareKey);
        saveTaxData(); // Persist state before leaving for payment
      window.location.href = STRIPE_PAYMENT_LINKS.per_question;
        return;
      }
    }
    if (PAID_QUESTIONS > 0) {
      PAID_QUESTIONS--;
      try {
        var payment = JSON.parse(localStorage.getItem('rmt_payment') || '{}');
        payment.usedQuestions = (payment.usedQuestions || 0) + 1;
        localStorage.setItem('rmt_payment', JSON.stringify(payment));
      } catch(e) { rlog('ERROR', e.message); }
    }
    STATE.answeredQs.add(compareKey);
    saveAnswered();
  }

  var scenarioChanges = {
    fs_mfj: { filingStatus: 'mfj' },
    fs_mfs: { filingStatus: 'mfs' },
    fs_single: { filingStatus: 'single' },
    fs_hoh: { filingStatus: 'hoh' },
    ira: { iraContribution: 7000 },
    hsa_single: { hsaContribution: 4300 },
    hsa_family: { hsaContribution: 8550 },
    dependent1: { numChildren: (STATE.taxData.numChildren||0)+1, dependents: (STATE.taxData.dependents||0)+1 },
    itemize: { itemized: { medical:0, stateTaxes:0, propertyTaxes:0, mortgageInterest:0, charitableCash:0, charitableNonCash:0 }},
    charity5k: { itemized: Object.assign({}, STATE.taxData.itemized||{}, { charitableCash: ((STATE.taxData.itemized||{}).charitableCash||0)+5000 }) },
  };

  var changes = scenarioChanges[scenarioId];
  if (!changes) return;

  var altData = Object.assign({}, STATE.taxData, changes);
  var altResult = computeTaxReturn(altData);
  var current = STATE.result;

  var el = document.getElementById('compare-result');
  if (!el) return;

  var diff = altResult.refundOrOwed - current.refundOrOwed;
  var taxDiff = altResult.totalTax - current.totalTax;

  var creditsRow = '';
  try { creditsRow = compareRow('Credits', current.schedules['3'].totalCredits, altResult.schedules['3'].totalCredits); } catch(e) { rlog('ERROR', e.message); }

  var stateRow = '';
  if (current.stateResult && altResult.stateResult) {
    stateRow = compareRow('State Tax', current.stateResult.tax, altResult.stateResult.tax);
  }

  el.innerHTML = '<div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;margin-top:16px">' +
    '<h3 style="font-size:15px;font-weight:700;margin-bottom:16px">Comparison Results</h3>' +
    '<div style="display:grid;grid-template-columns:1fr auto 1fr;gap:16px;align-items:start">' +
      '<div style="text-align:center">' +
        '<div style="color:var(--text-dim);font-size:11px;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px">Current</div>' +
        '<div style="font-size:12px;color:var(--text-muted);margin-bottom:4px">' + FS_LABELS[current.filingStatus] + '</div>' +
        '<div style="font-size:20px;font-weight:800;color:' + (current.refundOrOwed>=0?'var(--green)':'var(--red)') + '">' + (current.refundOrOwed>=0?'Refund':'Owed') + ': $' + fmt(Math.abs(current.refundOrOwed)) + '</div>' +
        '<div style="font-size:12px;color:var(--text-dim);margin-top:4px">Tax: $' + fmt(current.totalTax) + ' · Rate: ' + current.effectiveRate.toFixed(1) + '%</div>' +
      '</div>' +
      '<div style="display:flex;align-items:center;font-size:24px;color:var(--text-dim);padding-top:20px">→</div>' +
      '<div style="text-align:center">' +
        '<div style="color:var(--text-dim);font-size:11px;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px">Scenario</div>' +

        '<div style="font-size:20px;font-weight:800;color:' + (altResult.refundOrOwed>=0?'var(--green)':'var(--red)') + '">' + (altResult.refundOrOwed>=0?'Refund':'Owed') + ': $' + fmt(Math.abs(altResult.refundOrOwed)) + '</div>' +
        '<div style="font-size:12px;color:var(--text-dim);margin-top:4px">Tax: $' + fmt(altResult.totalTax) + ' · Rate: ' + altResult.effectiveRate.toFixed(1) + '%</div>' +

          '<th style="text-align:left;padding:6px;color:var(--text-dim)">Line Item</th>' +
          '<th style="text-align:right;padding:6px;color:var(--text-dim)">Current</th>' +
          '<th style="text-align:right;padding:6px;color:var(--text-dim)">Scenario</th>' +
          '<th style="text-align:right;padding:6px;color:var(--text-dim)">Diff</th>' +
        '</tr></thead>' +
        '<tbody>' +
          compareRow('Total Income', current.totalIncome, altResult.totalIncome) +
          compareRow('Adjustments', current.adjustments, altResult.adjustments) +
          compareRow('AGI', current.agi, altResult.agi) +
          compareRow('Deductions', current.deduction, altResult.deduction) +
          compareRow('Taxable Income', current.taxableIncome, altResult.taxableIncome) +
          compareRow('Income Tax', current.incomeTax, altResult.incomeTax) +
          creditsRow +
          compareRow('Total Tax', current.totalTax, altResult.totalTax) +
          compareRow('Total Payments', current.totalPayments, altResult.totalPayments) +
          stateRow +
        '</tbody></table>' +
    '</div></div>';
}

function runCustomWhatIf() {
  const extraIncome = parseFloat(document.getElementById('whatif-income')?.value) || 0;
  const extraDeductions = parseFloat(document.getElementById('whatif-deductions')?.value) || 0;
  const extraWithholding = parseFloat(document.getElementById('whatif-withholding')?.value) || 0;

  if (extraIncome === 0 && extraDeductions === 0 && extraWithholding === 0) {
    const el = document.getElementById('whatif-result');
    if (el) el.innerHTML = '<div style="color:var(--text-dim);font-size:12px;text-align:center;padding:8px">Enter values above and click Calculate</div>';
    return;
  }

  const altData = JSON.parse(JSON.stringify(STATE.taxData));
  // Add extra income as "other income"
  altData.otherIncome = (altData.otherIncome || 0) + extraIncome;
  // Add extra deductions via charitable
  if (extraDeductions > 0) {
    if (!altData.itemized) altData.itemized = { medical:0, stateTaxes:0, propertyTaxes:0, mortgageInterest:0, charitableCash:0, charitableNonCash:0 };
    altData.itemized.charitableCash = (altData.itemized.charitableCash || 0) + extraDeductions;
  }
  // Add extra withholding
  if (extraWithholding > 0 && altData.w2s && altData.w2s.length > 0) {
    altData.w2s[0].fedWithheld = (altData.w2s[0].fedWithheld || 0) + extraWithholding;
  } else if (extraWithholding > 0) {
    altData.estimatedPayments = (altData.estimatedPayments || 0) + extraWithholding;
  }

  const altResult = computeTaxReturn(altData);
  const current = STATE.result;
  const diff = altResult.refundOrOwed - current.refundOrOwed;

  const el = document.getElementById('whatif-result');
  if (!el) return;

  el.innerHTML = `
    <div style="display:grid;grid-template-columns:1fr auto 1fr;gap:12px;align-items:center;margin-top:8px">
      <div style="text-align:center">
        <div style="color:var(--text-dim);font-size:10px;text-transform:uppercase;letter-spacing:1px">Current</div>
        <div style="font-size:18px;font-weight:800;color:${current.refundOrOwed>=0?'var(--green)':'var(--red)'}">${current.refundOrOwed>=0?'Refund':'Owed'}: $${fmt(Math.abs(current.refundOrOwed))}</div>
      </div>
      <div style="font-size:20px;color:var(--text-dim)">→</div>
      <div style="text-align:center">
        <div style="color:var(--text-dim);font-size:10px;text-transform:uppercase;letter-spacing:1px">What-If</div>
        <div style="font-size:18px;font-weight:800;color:${altResult.refundOrOwed>=0?'var(--green)':'var(--red)'}">${altResult.refundOrOwed>=0?'Refund':'Owed'}: $${fmt(Math.abs(altResult.refundOrOwed))}</div>
      </div>
    </div>
    <div style="text-align:center;margin-top:8px;padding:8px;border-radius:6px;font-size:13px;font-weight:700;${diff > 0 ? 'background:rgba(34,197,94,0.1);color:var(--green)' : diff < 0 ? 'background:rgba(239,68,68,0.1);color:var(--red)' : 'background:var(--surface-light);color:var(--text-muted)'}">
      ${diff > 0 ? '+$' + fmt(diff) + ' better' : diff < 0 ? '-$' + fmt(Math.abs(diff)) + ' worse' : 'No change'}
      <span style="font-size:11px;font-weight:400;opacity:0.8;margin-left:6px">(effective rate: ${altResult.effectiveRate.toFixed(1)}%)</span>
    </div>
  `;
}

function compareYoY() {
  const lastIncome = parseFloat(document.getElementById('yoy-income')?.value) || 0;
  const lastTax = parseFloat(document.getElementById('yoy-tax')?.value) || 0;
  const lastRefund = parseFloat(document.getElementById('yoy-refund')?.value) || 0;
  if (lastIncome === 0 && lastTax === 0) { showToast('Enter last year\'s numbers first', 'error'); return; }

  // Save for next time
  localStorage.setItem('rmt_yoy_income', lastIncome);
  localStorage.setItem('rmt_yoy_tax', lastTax);
  localStorage.setItem('rmt_yoy_refund', lastRefund);

  const r = STATE.result;
  const lastRate = lastIncome > 0 ? (lastTax / lastIncome * 100) : 0;
  const el = document.getElementById('yoy-result');
  if (!el) return;

  const incDiff = r.totalIncome - lastIncome;
  const taxDiff = r.totalTax - lastTax;
  const refDiff = r.refundOrOwed - lastRefund;

  const arrow = (v) => v > 0 ? '&#x2191;' : v < 0 ? '&#x2193;' : '—';
  const diffColor = (v, inverse) => { const good = inverse ? v < 0 : v > 0; return good ? 'var(--green)' : v === 0 ? 'var(--text-dim)' : 'var(--red)'; };

  el.innerHTML = `
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;margin-top:12px">
      <h3 style="font-size:15px;font-weight:700;margin-bottom:16px">${TAX.year - 1} vs ${TAX.year}</h3>
      <div style="display:grid;grid-template-columns:1fr auto 1fr;gap:16px;text-align:center;margin-bottom:16px">
        <div>
          <div style="color:var(--text-dim);font-size:11px;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px">${TAX.year - 1}</div>
          <div style="font-size:18px;font-weight:800;color:var(--text)">$${fmt(lastIncome)}</div>
          <div style="font-size:12px;color:var(--text-dim)">Tax: $${fmt(lastTax)} · ${lastRate.toFixed(1)}%</div>
        </div>
        <div style="display:flex;align-items:center;font-size:24px;color:var(--text-dim)">→</div>
        <div>
          <div style="color:var(--text-dim);font-size:11px;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px">${TAX.year}</div>
          <div style="font-size:18px;font-weight:800;color:var(--text)">$${fmt(r.totalIncome)}</div>
          <div style="font-size:12px;color:var(--text-dim)">Tax: $${fmt(r.totalTax)} · ${r.effectiveRate.toFixed(1)}%</div>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px">
        <div style="background:var(--bg);border-radius:8px;padding:10px;text-align:center">
          <div style="font-size:11px;color:var(--text-dim)">Income Change</div>
          <div style="font-size:16px;font-weight:700;color:${diffColor(incDiff, false)}">${arrow(incDiff)} $${fmt(Math.abs(incDiff))}</div>
          <div style="font-size:10px;color:var(--text-dim)">${lastIncome > 0 ? ((incDiff / lastIncome) * 100).toFixed(1) + '%' : ''}</div>
        </div>
        <div style="background:var(--bg);border-radius:8px;padding:10px;text-align:center">
          <div style="font-size:11px;color:var(--text-dim)">Tax Change</div>
          <div style="font-size:16px;font-weight:700;color:${diffColor(taxDiff, true)}">${arrow(taxDiff)} $${fmt(Math.abs(taxDiff))}</div>
          <div style="font-size:10px;color:var(--text-dim)">${lastTax > 0 ? ((taxDiff / lastTax) * 100).toFixed(1) + '%' : ''}</div>
        </div>
        <div style="background:var(--bg);border-radius:8px;padding:10px;text-align:center">
          <div style="font-size:11px;color:var(--text-dim)">Refund Change</div>
          <div style="font-size:16px;font-weight:700;color:${diffColor(refDiff, false)}">${arrow(refDiff)} $${fmt(Math.abs(refDiff))}</div>
        </div>
      </div>
    </div>
  `;
}

function answerQuestion(id) {
  rlog('ANSWER_CLICK', { id, credits: PAID_QUESTIONS, alreadyAnswered: STATE.answeredQs.has(id) });
  const formHtml = getAssumptionForm(id);

  // Check if this is a paid question — $5 per question
  if (formHtml && !STATE.answeredQs.has(id) && PAID_QUESTIONS <= 0) {
    // Need payment — save which question they want, then redirect to Stripe
    if (STRIPE_PAYMENT_LINKS.per_question) {
      rlog('REDIRECT_TO_STRIPE', { questionId: id, link: STRIPE_PAYMENT_LINKS.per_question });
      localStorage.setItem('rmt_pending_question', id);
      saveTaxData(); // Persist state before leaving for payment
      window.location.href = STRIPE_PAYMENT_LINKS.per_question;
      return;
    }
    rlog('NO_PAYMENT_LINK', 'allowing free access (beta mode)');
    // If no payment link configured, allow free access (beta mode)
  }

  // Deduct from paid questions if applicable
  if (formHtml && PAID_QUESTIONS > 0 && !STATE.answeredQs.has(id)) {
    PAID_QUESTIONS--;
    rlog('CREDIT_USED', { questionId: id, remainingCredits: PAID_QUESTIONS });
    try {
      const payment = JSON.parse(localStorage.getItem('rmt_payment') || '{}');
      payment.usedQuestions = (payment.usedQuestions || 0) + 1;
      localStorage.setItem('rmt_payment', JSON.stringify(payment));
    } catch(e) { rlog('ERROR', e.message); }
  }

  if (formHtml) {
    rlog('SHOW_FORM', id);
    showAssumptionModal(id, formHtml);
  } else {
    STATE.answeredQs.add(id);
    saveAnswered();
    render();
  }
}

            <label style="display:block;color:var(--text-dim);font-size:12px;margin-bottom:4px">Net crypto gain/loss (include in capital gains)</label>
            <input type="number" id="modal-crypto-gain" step="100" value="${STATE.taxData.cryptoGain||0}" style="width:100%;padding:8px;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:6px;font-size:13px;font-family:inherit">
            <div style="margin-top:4px;font-size:11px;color:var(--text-dim)">Positive = gain, negative = loss. This is added to your Schedule D.</div>
          </div>
        </div>
        <div style="color:var(--text-dim);font-size:12px;line-height:1.5">
          <strong>IRS requires disclosure.</strong> You must answer "Yes" on Form 1040 if you sold, exchanged, or received digital assets. Gains are taxed as capital gains; losses can offset gains.
        </div>
      `;
    default:
      return null;
  }
}

function updateDepFields() {
  const container = document.getElementById('dep-details');
  if (!container) return;
  const numKids = parseInt(document.getElementById('modal-children')?.value) || 0;
  const numOther = parseInt(document.getElementById('modal-other-deps')?.value) || 0;
  const total = numKids + numOther;
  if (total === 0) { container.innerHTML = ''; return; }
  const deps = STATE.taxData.dependentDetails || [];
  let html = '<div style="margin-top:12px;margin-bottom:8px;color:var(--text-muted);font-size:13px;font-weight:600">Dependent Details (optional)</div>';
  for (let i = 0; i < total; i++) {
    const isChild = i < numKids;
    const existing = deps[i] || {};
    const label = isChild ? `Child ${i + 1}` : `Other Dependent ${i - numKids + 1}`;
    const credit = isChild ? '$2,000 CTC' : '$500 ODC';
    html += `<div style="display:flex;gap:8px;margin-bottom:8px;align-items:center">
      <input type="text" id="dep-name-${i}" placeholder="${label} first name" value="${esc(existing.name || '')}" style="flex:1;padding:8px;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:6px;font-size:13px;font-family:inherit">
      <select id="dep-rel-${i}" style="width:120px;padding:8px;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:6px;font-size:13px;font-family:inherit">
        <option value="child" ${(existing.relationship || 'child') === 'child' ? 'selected' : ''}>Child</option>
        <option value="stepchild" ${existing.relationship === 'stepchild' ? 'selected' : ''}>Stepchild</option>
        <option value="foster" ${existing.relationship === 'foster' ? 'selected' : ''}>Foster</option>
        <option value="sibling" ${existing.relationship === 'sibling' ? 'selected' : ''}>Sibling</option>
        <option value="parent" ${existing.relationship === 'parent' ? 'selected' : ''}>Parent</option>
        <option value="other" ${existing.relationship === 'other' ? 'selected' : ''}>Other</option>
      </select>
      <span style="color:var(--text-dim);font-size:11px;white-space:nowrap">${credit}</span>
    </div>`;
  }
  container.innerHTML = html;
}

function showAssumptionModal(id, formHtml) {
  const assumptionText = STATE.result.assumptions.find(a => a.id === id)?.text || '';
  const overlay = document.createElement('div');
  overlay.className = 'source-modal-overlay';
  overlay.id = 'assumption-modal';
  overlay.onclick = (e) => { if (e.target === overlay) closeAssumptionModal(); };
  overlay.innerHTML = `
    <div class="source-modal" style="height:auto;max-height:85vh;max-width:520px">
      <div class="source-modal-header">
        <div>
          <div class="title">Refine Your Return</div>
          <div class="filename">${assumptionText}</div>
        </div>
        <button class="close-btn" onclick="closeAssumptionModal()">Cancel</button>
      </div>
      <div class="source-modal-body" style="padding:20px;overflow-y:auto">
        ${formHtml}
        <div id="assumption-impact" style="background:var(--bg);border-radius:8px;padding:12px;margin-bottom:16px;display:none">
          <div style="color:var(--text-muted);font-size:12px;margin-bottom:4px">Impact on your return:</div>
          <div id="assumption-impact-text" style="font-size:16px;font-weight:700"></div>
        </div>
        <button onclick="applyAssumptionChange('${id}')" style="width:100%;padding:12px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit">
          Apply & Recalculate
        </button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);

  // Wire up itemized toggle if present
  const radios = overlay.querySelectorAll('input[name="deduction-type"]');
  radios.forEach(r => r.addEventListener('change', () => {
    const fields = document.getElementById('itemized-fields');
    if (fields) fields.style.display = r.value === 'itemized' && r.checked ? 'block' : 'none';
  }));

  // Wire up crypto radio toggle if present
  const cryptoRadios = overlay.querySelectorAll('input[name="crypto-answer"]');
