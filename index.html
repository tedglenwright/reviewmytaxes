function renderParsing() {
  const pct = STATE.ocrProgress;
  const fileProgress = STATE.ocrTotalFiles > 0 ? `File ${STATE.ocrCurrentFile} of ${STATE.ocrTotalFiles}` : '';
  const docsFound = STATE.parsedDocs.length;
  app.innerHTML = `
    <div class="container">
      <div class="upload-hero">
        <h1>Parsing Your Documents</h1>
        <p>Extracting tax data using PDF.js and Tesseract OCR — all processing happens in your browser</p>
      </div>
      <div class="ocr-progress">
        <div class="ocr-progress-bar"><div class="ocr-progress-fill" style="width:${pct}%"></div></div>
        <div class="ocr-progress-text">
          <span>${fileProgress}</span>
          <span>${docsFound > 0 ? docsFound + ' document' + (docsFound > 1 ? 's' : '') + ' found' : ''}</span>
          <span>${pct}%</span>
        </div>
      </div>
      ${docsFound > 0 ? `
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin:8px 0">
        ${STATE.parsedDocs.map(d => {
          const labels = { w2:'W-2', '1099int':'1099-INT', '1099div':'1099-DIV', '1099nec':'1099-NEC', '1099b':'1099-B', '1099misc':'1099-MISC', '1099r':'1099-R', '1098':'1098', 'ssa1099':'SSA-1099' };
          return '<span style="padding:3px 8px;background:rgba(34,197,94,0.15);color:var(--green);border-radius:4px;font-size:11px;font-weight:600">' + (labels[d.type] || d.type) + '</span>';
        }).join('')}
      </div>
      ` : ''}
      <div class="ocr-log" id="ocrlog">
        ${STATE.ocrLogs.map(l => `<div class="${l.type || ''}">${l.text}</div>`).join('')}
      </div>
    </div>
  `;
  const log = document.getElementById('ocrlog');
  if (log) log.scrollTop = log.scrollHeight;
}

function renderReview() {
  const r = STATE.result;
  if (!r) return;

  const answeredCount = STATE.answeredQs.size;
  const totalCost = answeredCount > 0 ? 5 : 0; // $5 flat for up to 3 questions
  const freeQsLeft = Math.max(0, 3 - answeredCount);

  app.innerHTML = `
    <div class="top-bar">
      <div class="top-bar-left">
        <button class="btn-back" onclick="goBack()">← New Return</button>
        <span style="color:var(--red);font-weight:700;font-size:13px;letter-spacing:2px">DRAFT</span>
        <span style="color:var(--text-muted);font-size:13px">${FS_LABELS[r.filingStatus]} · Tax Year ${TAX.year}</span>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        ${answeredCount > 0 ? `<div class="cost-badge">${answeredCount} refined · $5${answeredCount <= 3 ? ' ('+freeQsLeft+' left)' : ' + free'}</div>` : ''}
        <button onclick="shareSummary()" style="background:none;border:1px solid var(--border);color:var(--text-muted);border-radius:6px;padding:6px 12px;font-size:13px;cursor:pointer;font-family:inherit" title="Copy summary to clipboard">Share</button>
        <button onclick="downloadSummary()" style="background:none;border:1px solid var(--border);color:var(--text-muted);border-radius:6px;padding:6px 12px;font-size:13px;cursor:pointer;font-family:inherit" title="Download text summary">Download</button>
        <button onclick="window.print()" style="background:none;border:1px solid var(--border);color:var(--text-muted);border-radius:6px;padding:6px 12px;font-size:13px;cursor:pointer;font-family:inherit" title="Print draft return">Print</button>
        <span onclick="showChangelog()" style="color:var(--text-dim);font-size:10px;font-weight:600;cursor:pointer" title="Click for changelog">${APP_VERSION}</span>
      </div>
    </div>
    <div class="tabs">
      <button class="tab-btn ${STATE.tab==='return'?'active':''}" onclick="setTab('return')">Draft Return</button>
      <button class="tab-btn ${STATE.tab==='assumptions'?'active':''}" onclick="setTab('assumptions')">Refine (${r.assumptions.filter(a=>!STATE.answeredQs.has(a.id)).length})</button>
      <button class="tab-btn ${STATE.tab==='documents'?'active':''}" onclick="setTab('documents')">Documents</button>
      <button class="tab-btn ${STATE.tab==='pricing'?'active':''}" onclick="setTab('pricing')">Pricing</button>
      <button class="tab-btn ${STATE.tab==='compare'?'active':''}" onclick="setTab('compare')">Compare</button>
    </div>
    <div class="container tab-fade-in">
      ${STATE.tab === 'return' ? renderReturn(r) : ''}
      ${STATE.tab === 'assumptions' ? renderAssumptions(r) : ''}
      ${STATE.tab === 'documents' ? renderDocuments(r) : ''}
      ${STATE.tab === 'pricing' ? renderPricing() : ''}
      ${STATE.tab === 'compare' ? renderCompare(r) : ''}
    </div>
  `;
}

        ${(r.netSTCG + r.netLTCG) !== 0 ? lineItem('7. Capital gain/loss (Schedule D)', r.netSTCG + r.netLTCG, {showSign:true, onClick: r.schedules.form8949 && r.schedules.form8949.some(t=>t._sourceURL) ? 'showCapGainSource(0)' : ''}) : ''}
        ${r.schedENet !== 0 ? lineItem('Schedule E rental income', r.schedENet, {showSign:true}) : ''}

        ${r.schedules['1'].gamblingIncome > 0 ? lineItem('   Gambling winnings', r.schedules['1'].gamblingIncome, {sub:true}) : ''}
        ${r.schedules['1'].alimonyReceived > 0 ? lineItem('   Alimony received', r.schedules['1'].alimonyReceived, {sub:true}) : ''}
        ${r.schedules['1'].rentalIncome > 0 ? lineItem('   Rental income', r.schedules['1'].rentalIncome, {sub:true}) : ''}
        ${r.schedules['1'].otherMiscIncome > 0 ? lineItem('   Other misc income', r.schedules['1'].otherMiscIncome, {sub:true}) : ''}
        ${lineItem('9. Total income', r.totalIncome, {bold:true})}

        ${sectionHeader('Adjustments to Income', 'Line 10')}

        ${r.schedules['1'].studentLoanDed > 0 ? lineItem('Student loan interest', r.schedules['1'].studentLoanDed, {indent:true, sub:true}) : ''}

        ${r.adjustments === 0 ? lineItem('No adjustments', 0, {sub:true}) : ''}
        ${lineItem('10. Adjustments', r.adjustments, {bold:true})}

        ${sectionHeader('Adjusted Gross Income', 'Line 11')}
        ${lineItem('11. AGI', r.agi, {bold:true})}

        ${sectionHeader('Deductions', 'Lines 12–15')}
        ${lineItem('12. ' + (r.usingItemized ? 'Itemized deductions (Schedule A)' : 'Standard deduction'), r.deduction)}
        ${r.qbiDeduction > 0 ? lineItem('13. Qualified business income deduction', r.qbiDeduction) : ''}
        ${lineItem('15. Taxable income', r.taxableIncome, {bold:true})}

        ${sectionHeader('Tax Computation', 'Lines 16–24')}

        ${r.ltcgTax > 0 ? lineItem('LTCG / qualified dividend tax', r.ltcgTax, {indent:true, sub:true}) : ''}
        ${lineItem('16. Tax', r.incomeTax)}
        ${r.schedules['3'].totalCredits > 0 ? (() => {
          let credHtml = '';
          if (r.schedules['3'].childTaxCredit > 0) credHtml += lineItem('Child tax credit', -r.schedules['3'].childTaxCredit, {indent:true, sub:true});
          if (r.schedules['3'].otherDepCredit > 0) credHtml += lineItem('Other dependent credit', -r.schedules['3'].otherDepCredit, {indent:true, sub:true});
          if (r.schedules['3'].educationCredit > 0) credHtml += lineItem('Education credit', -r.schedules['3'].educationCredit, {indent:true, sub:true});
          if (r.schedules['3'].childCareCredit > 0) credHtml += lineItem('Child/dependent care credit', -r.schedules['3'].childCareCredit, {indent:true, sub:true});
          if (r.schedules['3'].saversCredit > 0) credHtml += lineItem('Saver\'s credit', -r.schedules['3'].saversCredit, {indent:true, sub:true});
          if (r.schedules['3'].energyCredit > 0) credHtml += lineItem('Residential energy credit', -r.schedules['3'].energyCredit, {indent:true, sub:true});

          <div class="lbl">${r.refundOrOwed >= 0 ? 'Estimated Refund' : 'Estimated Amount Owed'}</div>

        <div style="margin-top:12px;padding:10px 14px;background:rgba(34,197,94,0.08);border:1px solid var(--green-dark);border-radius:8px;font-size:13px;color:var(--green);display:flex;justify-content:space-between;align-items:center">

          <span style="font-weight:700">$0 state tax</span>

        ${r.totalStateWithheld > 0 ? `<div style="margin-top:8px;padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:8px;font-size:12px;color:var(--text-muted);display:flex;justify-content:space-between;align-items:center">

        <div style="margin-top:12px;padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:8px;font-size:12px;color:var(--text-muted);display:flex;justify-content:space-between;align-items:center">
          <span>State income tax withheld — select your state for a state estimate</span>
          <span style="color:var(--text);font-weight:600">$${fmt(r.totalStateWithheld)}</span>
        </div>
        ` : ''}
  `;

  // Tax Bracket Visualization
  html += `
    ${sectionHeader('Tax Bracket Breakdown', 'How your income is taxed')}
    <div style="margin-bottom:16px">
  `;
  const brackets = TAX.brackets[r.filingStatus];
  let prevLimit = 0;
  const totalTaxable = r.taxableIncome;
  const ordIncome = Math.max(0, totalTaxable - Math.max(0, r.netLTCG) - r.totalQualDiv);
  for (let i = 0; i < brackets.length && prevLimit < ordIncome; i++) {
    const [limit, rate] = brackets[i];
    const bracketSize = Math.min(ordIncome, limit) - prevLimit;
    if (bracketSize <= 0) { prevLimit = limit; continue; }
    const pctOfIncome = totalTaxable > 0 ? (bracketSize / totalTaxable * 100) : 0;
    const taxInBracket = Math.round(bracketSize * rate);
    const colors = ['#22c55e','#4ade80','#86efac','#fbbf24','#f97316','#ef4444','#dc2626'];
    const color = colors[Math.min(i, colors.length - 1)];
    html += `
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;font-size:12px">
        <div style="width:50px;text-align:right;color:var(--text-muted);flex-shrink:0">${(rate*100).toFixed(0)}%</div>
        <div style="flex:1;height:20px;background:var(--surface);border-radius:4px;overflow:hidden;position:relative">
          <div style="height:100%;width:${Math.max(pctOfIncome, 2)}%;background:${color};border-radius:4px;transition:width 0.5s"></div>
        </div>
        <div style="width:90px;text-align:right;color:var(--text-dim);flex-shrink:0">$${fmt(bracketSize)}</div>
        <div style="width:70px;text-align:right;color:${color};font-weight:600;flex-shrink:0">$${fmt(taxInBracket)}</div>
      </div>
    `;
    prevLimit = limit;
  }
  html += `
      <div style="display:flex;justify-content:flex-end;gap:8px;font-size:11px;color:var(--text-dim);margin-top:8px;padding-right:0">
        <span>Income in bracket</span>
        <span style="width:70px;text-align:right">Tax</span>
      </div>
    </div>
  `;

  // Tax Savings Tips (personalized based on user's situation)
  const tips = [];
  if (!STATE.taxData.hsaContribution && !STATE.answeredQs.has('no_hsa')) {
    tips.push({ icon: '&#x1f3e5;', title: 'HSA Contributions', text: `Contributing to an HSA could reduce your taxable income by up to $${(r.filingStatus === 'mfj' ? 8550 : 4300).toLocaleString()}.` });
  }
  if (!STATE.taxData.iraContribution && !STATE.answeredQs.has('no_hsa')) {
    tips.push({ icon: '&#x1f4b0;', title: 'IRA Contributions', text: 'A Traditional IRA contribution (up to $7,000) reduces your taxable income directly.' });
  }
  if (!STATE.taxData.dependents && !STATE.answeredQs.has('dependents')) {
    tips.push({ icon: '&#x1f476;', title: 'Child Tax Credit', text: 'If you have children under 17, the $2,000/child credit could significantly reduce your tax.' });
  }
  if (r.schedCNet > 0 && r.schedules.C && r.schedules.C.totalExpenses === 0) {
    tips.push({ icon: '&#x1f4bc;', title: 'Business Expenses', text: 'You have self-employment income but no expenses deducted. Home office, supplies, mileage, and internet may be deductible.' });
  }
  if (!r.usingItemized && r.totalStateWithheld > 0) {
    const potentialSalt = Math.min(r.totalStateWithheld, TAX.saltCap[r.filingStatus]);
    tips.push({ icon: '&#x1f3e0;', title: 'Itemized Deductions', text: `Your state taxes ($${fmt(r.totalStateWithheld)}) alone may push you toward itemizing if you also have mortgage interest or charitable contributions.` });
  }
  if (r.marginalRate >= 24 && !STATE.taxData.educationCredit) {
    tips.push({ icon: '&#x1f393;', title: 'Education Credits', text: 'If you or a dependent are in college, the AOTC ($2,500) or LLC ($2,000) could help.' });
  }

  if (tips.length > 0) {
    html += sectionHeader('Potential Tax Savings', 'Based on your return');
    html += `<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:10px;margin-bottom:16px">`;
    tips.forEach(tip => {
      html += `
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px;cursor:pointer" onclick="setTab('assumptions')">
          <div style="display:flex;gap:8px;align-items:flex-start">
            <div style="font-size:20px;flex-shrink:0">${tip.icon}</div>
            <div>
              <div style="font-size:13px;font-weight:600;color:var(--green)">${tip.title}</div>
              <div style="font-size:11px;color:var(--text-dim);margin-top:4px;line-height:1.4">${tip.text}</div>
            </div>
          </div>
        </div>
      `;
    });
    html += `</div>`;
  }

  // Schedule A
  if (r.schedules.A) {
    const a = r.schedules.A;
    html += sectionHeader('Schedule A — Itemized Deductions', 'Form 1040, Schedule A');
    if (a.medical > 0) {
      html += lineItem('Medical expenses', a.medical, {sub:true});
      html += lineItem(`Less ${TAX.medicalExpenseFloor*100}% of AGI`, -a.medicalThreshold, {sub:true});
      html += lineItem('Medical deduction', a.medicalDeduction, {indent:true});
    }
    html += lineItem(`SALT (capped at $${TAX.saltCap[r.filingStatus].toLocaleString()})`, a.saltDeduction, {indent:true});
    if (a.mortgageInterest > 0) html += lineItem('Mortgage interest', a.mortgageInterest, {indent:true, onClick: r._mortgageSources && r._mortgageSources.length > 0 ? 'showMortgageSource()' : ''});
    if (a.charitableCash > 0) html += lineItem('Charitable (cash)', a.charitableCash, {indent:true});
    if (a.charitableNonCash > 0) html += lineItem('Charitable (non-cash)', a.charitableNonCash, {indent:true});
    html += lineItem('Total Itemized Deductions', a.totalItemized, {bold:true});
  }

  // Schedule B
  if (r.schedules.B) {
    const b = r.schedules.B;
    html += sectionHeader('Schedule B — Interest and Dividends', 'Form 1040, Schedule B');
    b.interestItems.forEach((item, idx) => { html += lineItem('  ' + esc(item.payer), item.amount, {sub:true, onClick: item._sourceURL ? 'showInterestSource('+idx+')' : ''}); });
    html += lineItem('Total interest', b.totalInterest, {indent:true});
    b.dividendItems.forEach((item, idx) => { html += lineItem('  ' + esc(item.payer), item.ordinary, {sub:true, onClick: item._sourceURL ? 'showDividendSource('+idx+')' : ''}); });
    html += lineItem('Total ordinary dividends', b.totalOrdDiv, {indent:true});
  }

  // Schedule C
  if (r.schedules.C) {
    const c = r.schedules.C;
    html += sectionHeader(`Schedule C — ${c.businessName}`, 'Form 1040, Schedule C');
    html += lineItem('Gross receipts', c.grossReceipts);
    if (c.cogs > 0) html += lineItem('Cost of goods sold', -c.cogs);
    html += lineItem('Gross income', c.grossIncome);
    html += lineItem('Total expenses', c.totalExpenses);
    html += lineItem('Net profit', c.netProfit, {bold:true});
  }

  // Schedule SE
  if (r.schedules.SE) {
    const se = r.schedules.SE;
    html += sectionHeader('Schedule SE — Self-Employment Tax', 'Form 1040, Schedule SE');
    html += lineItem('Net SE earnings (92.35%)', se.netEarnings);
    html += lineItem('Social Security tax', se.ssTax, {indent:true});
    html += lineItem('Medicare tax', se.medicareTax, {indent:true});
    if (se.additionalMedicare > 0) html += lineItem('Additional Medicare tax', se.additionalMedicare, {indent:true});
    html += lineItem('Total SE tax', se.totalSETax, {bold:true});
    html += lineItem('Deductible portion (½)', se.deduction, {sub:true});
  }

  // Schedule E
  if (r.schedules.E) {
    html += sectionHeader('Schedule E — Rental Income', 'Supplemental Income');
    r.schedules.E.properties.forEach((p, i) => {
      html += lineItem(esc(p.description) || 'Property ' + (i+1) + ' gross rents', p.rents);
      const exp = (p.mortgage||0)+(p.taxes||0)+(p.insurance||0)+(p.repairs||0)+(p.depreciation||0)+(p.utilities||0);
      if (exp > 0) html += lineItem('   Total expenses', exp, {sub:true});
      html += lineItem('   Net income', p._netIncome, {sub:true, showSign:true});
    });
    html += lineItem('Total Schedule E', r.schedules.E.totalNet, {bold:true, showSign:true});
  }

  // Schedule D
  if (r.schedules.D) {
    const d = r.schedules.D;
    html += sectionHeader('Schedule D — Capital Gains and Losses', 'Form 1040, Schedule D');
    html += `<div style="font-size:13px;color:var(--text-muted);margin-bottom:8px">Part I — Short-Term</div>`;
    html += lineItem('Net short-term gain/loss', d.netSTCG, {showSign:true});
    html += `<div style="font-size:13px;color:var(--text-muted);margin:8px 0">Part II — Long-Term</div>`;
    html += lineItem('Net long-term gain/loss', d.netLTCG, {showSign:true});
    html += lineItem('Total net gain/loss', d.totalNetGain, {bold:true, showSign:true});
    if (d.capitalLossCarryover > 0) html += lineItem('Capital loss carryforward to 2026', d.capitalLossCarryover, {sub:true});
  }

  // Form 8949
  if (r.schedules.form8949) {
    html += sectionHeader('Form 8949 — Sales of Capital Assets', 'Form 8949');
    html += `<div style="overflow-x:auto"><table class="form8949-table"><thead><tr>
      <th>Description</th><th>Acquired</th><th>Sold</th>
      <th class="right">Proceeds</th><th class="right">Basis</th><th class="right">Gain/Loss</th><th class="center">Term</th>
    </tr></thead><tbody>`;
    r.schedules.form8949.forEach((t, idx) => {
      const gl = (t.proceeds||0) - (t.basis||0);
      const rowClick = t._sourceURL ? ` style="cursor:pointer" onclick="showCapGainSource(${idx})" title="Click to view source document"` : '';
      html += `<tr${rowClick}>
        <td>${esc(t.description)}${t._sourceURL ? ' <span style="color:var(--accent-light);font-size:10px">&#8599;</span>' : ''}</td><td class="muted">${t.dateAcquired}</td><td class="muted">${t.dateSold}</td>
        <td class="right">$${fmt(t.proceeds)}</td><td class="right">$${fmt(t.basis)}</td>
        <td class="right">${moneyHtml(gl, true)}</td>
        <td class="center">${t.longTerm ? 'LT' : 'ST'}</td>
      </tr>`;
    });
    html += `</tbody></table></div>`;
  }

  // Next Steps
  const unansweredCount = r.assumptions.filter(a => !STATE.answeredQs.has(a.id) && getAssumptionForm(a.id)).length;
  html += `
    ${sectionHeader('What You Can Do Next', '')}
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:24px">
      ${unansweredCount > 0 ? `
      <div class="assumption-card" style="cursor:pointer;text-align:center" onclick="setTab('assumptions')">
        <div style="flex:1">
          <div style="font-size:24px;margin-bottom:6px">&#x270F;&#xFE0F;</div>
          <div style="font-size:13px;font-weight:600;color:var(--accent-light)">Refine Your Return</div>
          <div style="font-size:11px;color:var(--text-dim);margin-top:4px">${unansweredCount} question${unansweredCount>1?'s':''} can improve accuracy</div>
        </div>
      </div>` : ''}
      <div class="assumption-card" style="cursor:pointer;text-align:center" onclick="setTab('documents')">
        <div style="flex:1">
          <div style="font-size:24px;margin-bottom:6px">&#x1F4C4;</div>
          <div style="font-size:13px;font-weight:600;color:var(--accent-light)">View Documents</div>
          <div style="font-size:11px;color:var(--text-dim);margin-top:4px">Review uploaded source documents</div>
        </div>
      </div>
      <div class="assumption-card" style="cursor:pointer;text-align:center" onclick="window.print()">
        <div style="flex:1">
          <div style="font-size:24px;margin-bottom:6px">&#x1F5A8;&#xFE0F;</div>
          <div style="font-size:13px;font-weight:600;color:var(--accent-light)">Print This Draft</div>
          <div style="font-size:11px;color:var(--text-dim);margin-top:4px">Save as PDF or print for your records</div>
        </div>
      </div>
      <div class="assumption-card" style="cursor:pointer;text-align:center" onclick="goBack()">
        <div style="flex:1">
          <div style="font-size:24px;margin-bottom:6px">&#x1F504;</div>
          <div style="font-size:13px;font-weight:600;color:var(--accent-light)">Start Over</div>
          <div style="font-size:11px;color:var(--text-dim);margin-top:4px">Upload different documents</div>
        </div>
      </div>
    </div>
  `;

  // Footer
  html += `
        <div class="footer-disclaimer">
          <div class="title">⚠ THIS IS A DRAFT ESTIMATE — NOT AN OFFICIAL TAX RETURN ⚠</div>
          This document was generated by automated software and has not been reviewed by a licensed tax professional.
          It is intended solely for informational, comparison, and educational purposes. The creators and operators
          are not licensed CPAs, enrolled agents, or tax attorneys. They assume no liability for accuracy, omissions,
          or consequences. Federal and state tax law is complex and changes frequently. Do not file this document
          with the IRS or any state tax authority. If you choose to transcribe data onto official forms, you do so
          at your own risk. Always consult a qualified tax professional before filing. By using this tool, you
          acknowledge the operators bear no responsibility for errors or resulting tax liabilities.
          <div class="version">Tax Year ${TAX.year} · Generated ${new Date().toLocaleDateString()} · ${APP_VERSION}
            · <a href="${GITHUB_ISSUES}" target="_blank" rel="noopener" style="color:var(--accent-light);text-decoration:none">Report a bug</a>
          </div>
          <div style="margin-top:6px"><a href="${GITHUB_REPO}" target="_blank" rel="noopener" style="color:var(--accent-light);text-decoration:none;font-weight:600">
            <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor" style="vertical-align:-1px;margin-right:3px"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
            Open source — verify every line of code on GitHub
          </a></div>
        </div>
      </div>
    </div>
  `;
  return html;
}

function renderAssumptions(r) {
  const unanswered = r.assumptions.filter(a => !STATE.answeredQs.has(a.id));
  const answeredList = r.assumptions.filter(a => STATE.answeredQs.has(a.id));
  const answeredCount = STATE.answeredQs.size;
  const freeQsLeft = Math.max(0, 3 - answeredCount);

  let html = `
    <div style="margin-bottom:16px">
      <h2 style="font-size:18px;font-weight:700">Assumptions & Questions</h2>
      <p style="color:var(--text-muted);font-size:13px;margin-top:4px">
        Your draft return made these assumptions. Refine them to get a more accurate estimate.
      </p>
      <div style="margin-top:10px;padding:10px 14px;background:rgba(59,130,246,0.08);border:1px solid var(--accent);border-radius:8px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">
        <div>
          <div style="color:var(--accent-light);font-size:14px;font-weight:700">$5 for 3 questions</div>
          <div style="color:var(--text-muted);font-size:11px;margin-top:2px">${answeredCount >= 3 ? 'All additional questions are free' : PAID_QUESTIONS > 0 ? PAID_QUESTIONS + ' paid question' + (PAID_QUESTIONS !== 1 ? 's' : '') + ' ready to use' : answeredCount > 0 ? freeQsLeft + ' question' + (freeQsLeft !== 1 ? 's' : '') + ' remaining in your $5 bundle' : 'First 3 refinements for $5 total · Free after that'}</div>
        </div>
        <div style="color:var(--accent-light);font-size:20px;font-weight:800">$5</div>
      </div>
      ${answeredCount > 0 ? `<div style="margin-top:8px;padding:8px 12px;background:rgba(34,197,94,0.08);border:1px solid var(--green-dark);border-radius:6px;font-size:12px;color:var(--green)">
        &#x2713; ${answeredCount} assumption${answeredCount>1?'s':''} refined · Return recalculated
      </div>` : ''}
    </div>
    <div class="refine-progress">
      ${r.assumptions.filter(a => getAssumptionForm(a.id)).map((a, i) => {
        const done = STATE.answeredQs.has(a.id);
        const nextUnanswered = !done && !r.assumptions.filter(a2 => getAssumptionForm(a2.id)).slice(0, i).some(a2 => !STATE.answeredQs.has(a2.id));
        return `<div class="refine-dot ${done ? 'complete' : (nextUnanswered ? 'current' : '')}" title="${a.text.substring(0, 60)}"></div>`;
      }).join('')}
    </div>
  `;

  if (unanswered.length > 0) {
    html += `<div style="color:var(--text-dim);font-size:12px;margin-bottom:8px;font-weight:600">Needs your input (${unanswered.length})</div>`;
    unanswered.forEach((a, i) => {
      const canInteract = getAssumptionForm(a.id) !== null;
      const isFree = answeredCount >= 3 || !canInteract;
      const needsPayment = canInteract && !isFree && PAID_QUESTIONS <= 0 && STRIPE_PAYMENT_LINKS.three_questions;
      html += `
        <div class="assumption-card">
          <div style="flex:1">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
              <span class="impact-badge ${a.impact}">${a.impact} impact</span>
              ${canInteract ? '<span style="color:var(--accent-light);font-size:10px;font-weight:600">INTERACTIVE</span>' : ''}
            </div>
            <div class="assumption-text">${a.text}</div>
          </div>
          <button class="btn-answer" onclick="answerQuestion('${a.id}')" style="${canInteract ? 'padding:8px 16px;font-size:13px' : ''}${needsPayment ? ';background:var(--green)' : ''}">
            ${!canInteract ? 'OK' : needsPayment ? 'Pay $5 → Refine' : isFree ? 'Refine (free)' : 'Refine'}
          </button>
        </div>
      `;
    });
  }

  if (answeredList.length > 0) {
    html += `<div style="color:var(--text-dim);font-size:12px;margin:16px 0 8px;font-weight:600">Already refined (${answeredList.length})</div>`;
    answeredList.forEach(a => {
      html += `
        <div class="assumption-card answered">
          <div style="flex:1">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
              <span class="impact-badge ${a.impact}">${a.impact} impact</span>
              <span class="answered-label">&#x2713; Refined</span>
            </div>
            <div class="assumption-text">${a.text}</div>
          </div>
          <button class="btn-answer" style="background:var(--surface-light)" onclick="answerQuestion('${a.id}')">Edit</button>
        </div>
      `;
    });
  }

  return html;
}

function addFiles(fileList) {
  const validTypes = ['application/pdf', 'image/jpeg', 'image/png', 'image/tiff', 'image/bmp', 'image/gif', 'image/webp'];
  const validExts = ['.pdf', '.jpg', '.jpeg', '.png', '.tiff', '.tif', '.bmp', '.gif', '.webp'];
  let skipped = 0;
  for (const f of fileList) {
    const ext = '.' + f.name.split('.').pop().toLowerCase();
    if (validTypes.includes(f.type) || validExts.includes(ext)) {
      STATE.files.push(f);
    } else {
      skipped++;
    }
  }
  if (skipped > 0) {
    showToast(`${skipped} file${skipped > 1 ? 's' : ''} skipped — only PDF and image files are supported`, 'error');
  }
  render();
}

function removeFile(i) {
  STATE.files.splice(i, 1);
  render();
}

async function startParsing() {
  STATE.screen = 'parsing';
  STATE.ocrLogs = [];
  STATE.ocrProgress = 0;
  STATE.ocrCurrentFile = 0;
  STATE.ocrTotalFiles = STATE.files.length;
  STATE.parsedDocs = [];

  render();

  const parser = new TaxDocumentParser(
    (text) => {
      const isHighlight = text.includes('Detected:') || text.includes('$');
      const isWarn = text.includes('⚠');
      STATE.ocrLogs.push({ text, type: isHighlight ? 'highlight' : (isWarn ? 'warn' : '') });
      render();
    },
    (pct) => {
      STATE.ocrProgress = pct;
      render();
    }
  );

  for (let i = 0; i < STATE.files.length; i++) {
    STATE.ocrCurrentFile = i + 1;
    STATE.ocrProgress = 0;
    render();
    try {
      const doc = await parser.parseFile(STATE.files[i]);
      if (doc) {
        doc._sourceURL = URL.createObjectURL(STATE.files[i]);
        doc._sourceFileName = STATE.files[i].name;
        STATE.parsedDocs.push(doc);
      }
    } catch (err) {
      const msg = err && err.message ? err.message : String(err);
      STATE.ocrLogs.push({ text: `Error parsing ${STATE.files[i].name}: ${msg}`, type: 'warn' });
      if (STATE.files[i].name.toLowerCase().endsWith('.pdf')) {
        STATE.ocrLogs.push({ text: 'Tip: If this PDF is password-protected or encrypted, try exporting it as an unprotected PDF first.', type: 'warn' });
      }
      render();
    }
  }

  STATE.ocrLogs.push({ text: `\nParsing complete — ${STATE.parsedDocs.length} document(s) processed`, type: 'highlight' });
  STATE.ocrProgress = 100;
  render();

  // Small delay then show results
  setTimeout(() => {
    if (STATE.parsedDocs.length > 0) {
      STATE.taxData = aggregateParsedDocs(STATE.parsedDocs);
      STATE.result = computeTaxReturn(STATE.taxData);
      STATE.originalResult = { ...STATE.result };
      STATE.screen = 'review';
      STATE.tab = 'return';
      STATE.answeredQs = new Set();
    } else {
      STATE.ocrLogs.push({ text: 'No tax data could be extracted from your files.', type: 'warn' });
      STATE.ocrLogs.push({ text: 'Tips: Make sure your PDFs are W-2s, 1099s, or 1098s.', type: 'warn' });
      STATE.ocrLogs.push({ text: 'Scanned/image PDFs may take longer. Try a clear, high-resolution scan.', type: '' });
      STATE.ocrLogs.push({ text: 'You can also try a demo scenario below to see how the app works.', type: '' });
      render();
      showToast('No tax documents detected. Try demo scenarios or different files.', 'error');
    }
    render();
  }, 1500);
}

function loadDemo(key) {
  STATE.taxData = JSON.parse(JSON.stringify(DEMOS[key].data));
  STATE.result = computeTaxReturn(STATE.taxData);
  STATE.originalResult = { ...STATE.result };
  STATE.screen = 'review';
  STATE.tab = 'return';
  STATE.answeredQs = new Set();
  render();
}

function goBack() {
  // Revoke object URLs to free memory
  if (STATE.result) {
    const r = STATE.result;
    (r.w2s||[]).forEach(w => { if (w._sourceURL) URL.revokeObjectURL(w._sourceURL); });
    (r.interest||[]).forEach(i => { if (i._sourceURL) URL.revokeObjectURL(i._sourceURL); });
    (r.dividends||[]).forEach(d => { if (d._sourceURL) URL.revokeObjectURL(d._sourceURL); });
    (r._necSources||[]).forEach(s => { if (s._sourceURL) URL.revokeObjectURL(s._sourceURL); });
    (r._mortgageSources||[]).forEach(s => { if (s._sourceURL) URL.revokeObjectURL(s._sourceURL); });
    if (r.schedules && r.schedules.form8949) {
      r.schedules.form8949.forEach(t => { if (t._sourceURL) URL.revokeObjectURL(t._sourceURL); });
    }
  }
  STATE.screen = 'upload';
  STATE.files = [];
  STATE.parsedDocs = [];

  render();
}

function setTab(t) {
  STATE.tab = t;
  render();
}

function compareRow(label, current, scenario) {
  const diff = scenario - current;
  return '<tr style="border-bottom:1px solid var(--surface-light)">' +
    '<td style="padding:6px;color:var(--text-muted)">' + label + '</td>' +
    '<td style="text-align:right;padding:6px;color:var(--text)">$' + fmt(current) + '</td>' +
    '<td style="text-align:right;padding:6px;color:var(--text)">$' + fmt(scenario) + '</td>' +
    '<td style="text-align:right;padding:6px;color:' + (diff < 0 ? 'var(--green)' : diff > 0 ? 'var(--red)' : 'var(--text-dim)') + ';font-weight:' + (diff !== 0 ? '600' : '400') + '">' + (diff !== 0 ? (diff > 0 ? '+' : '') + '$' + fmt(diff) : '—') + '</td>' +
    '</tr>';
}

function renderCompare(r) {
  const scenarios = [
    { id: 'fs_mfj', label: 'File as Married Filing Jointly', show: r.filingStatus !== 'mfj' },
    { id: 'fs_mfs', label: 'File as Married Filing Separately', show: r.filingStatus !== 'mfs' },

      s.label + '</button>';
  });

  html += '</div><div id="compare-result"></div>';
  return html;
}

function runScenario(scenarioId) {
  // Check payment gate — comparisons count as questions (but don't charge for re-runs)
  var compareKey = 'compare_' + scenarioId;
  if (!STATE.answeredQs.has(compareKey)) {
    if (STATE.answeredQs.size < 3 && PAID_QUESTIONS <= 0) {
      if (STRIPE_PAYMENT_LINKS.three_questions) {
        window.location.href = STRIPE_PAYMENT_LINKS.three_questions;
        return;
      }
    }
    if (PAID_QUESTIONS > 0) {
      PAID_QUESTIONS--;
      try {
        var payment = JSON.parse(localStorage.getItem('rmt_payment') || '{}');
        payment.usedQuestions = (payment.usedQuestions || 0) + 1;
        localStorage.setItem('rmt_payment', JSON.stringify(payment));
      } catch(e) {}
    }
    STATE.answeredQs.add(compareKey);
    try { sessionStorage.setItem('rmt_answered', JSON.stringify([...STATE.answeredQs])); } catch(e) {}
  }

  var scenarioChanges = {
    fs_mfj: { filingStatus: 'mfj' },
    fs_mfs: { filingStatus: 'mfs' },
    fs_single: { filingStatus: 'single' },
    fs_hoh: { filingStatus: 'hoh' },
    ira: { iraContribution: 7000 },
    hsa_single: { hsaContribution: 4300 },
    hsa_family: { hsaContribution: 8550 },
    dependent1: { numChildren: (STATE.taxData.numChildren||0)+1, dependents: (STATE.taxData.dependents||0)+1 },
    itemize: { itemized: { medical:0, stateTaxes:0, propertyTaxes:0, mortgageInterest:0, charitableCash:0, charitableNonCash:0 }},
    charity5k: { itemized: Object.assign({}, STATE.taxData.itemized||{}, { charitableCash: ((STATE.taxData.itemized||{}).charitableCash||0)+5000 }) },
  };

  var changes = scenarioChanges[scenarioId];
  if (!changes) return;

  var altData = Object.assign({}, STATE.taxData, changes);
  var altResult = computeTaxReturn(altData);
  var current = STATE.result;

  var el = document.getElementById('compare-result');
  if (!el) return;

  var diff = altResult.refundOrOwed - current.refundOrOwed;
  var taxDiff = altResult.totalTax - current.totalTax;

  var creditsRow = '';
  try { creditsRow = compareRow('Credits', current.schedules['3'].totalCredits, altResult.schedules['3'].totalCredits); } catch(e) {}

  var stateRow = '';
  if (current.stateResult && altResult.stateResult) {
    stateRow = compareRow('State Tax', current.stateResult.tax, altResult.stateResult.tax);
  }

  el.innerHTML = '<div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;margin-top:16px">' +
    '<h3 style="font-size:15px;font-weight:700;margin-bottom:16px">Comparison Results</h3>' +
    '<div style="display:grid;grid-template-columns:1fr auto 1fr;gap:16px;align-items:start">' +
      '<div style="text-align:center">' +
        '<div style="color:var(--text-dim);font-size:11px;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px">Current</div>' +
        '<div style="font-size:12px;color:var(--text-muted);margin-bottom:4px">' + FS_LABELS[current.filingStatus] + '</div>' +
        '<div style="font-size:20px;font-weight:800;color:' + (current.refundOrOwed>=0?'var(--green)':'var(--red)') + '">' + (current.refundOrOwed>=0?'Refund':'Owed') + ': $' + fmt(Math.abs(current.refundOrOwed)) + '</div>' +
        '<div style="font-size:12px;color:var(--text-dim);margin-top:4px">Tax: $' + fmt(current.totalTax) + ' · Rate: ' + current.effectiveRate.toFixed(1) + '%</div>' +
      '</div>' +
      '<div style="display:flex;align-items:center;font-size:24px;color:var(--text-dim);padding-top:20px">→</div>' +
      '<div style="text-align:center">' +
        '<div style="color:var(--text-dim);font-size:11px;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px">Scenario</div>' +
        '<div style="font-size:12px;color:var(--text-muted);margin-bottom:4px">' + FS_LABELS[altResult.filingStatus] + '</div>' +
        '<div style="font-size:20px;font-weight:800;color:' + (altResult.refundOrOwed>=0?'var(--green)':'var(--red)') + '">' + (altResult.refundOrOwed>=0?'Refund':'Owed') + ': $' + fmt(Math.abs(altResult.refundOrOwed)) + '</div>' +
        '<div style="font-size:12px;color:var(--text-dim);margin-top:4px">Tax: $' + fmt(altResult.totalTax) + ' · Rate: ' + altResult.effectiveRate.toFixed(1) + '%</div>' +
      '</div>' +
    '</div>' +
    '<div style="margin-top:16px;padding:12px;border-radius:8px;text-align:center;font-size:14px;font-weight:700;' +
      (diff > 0 ? 'background:rgba(34,197,94,0.1);border:1px solid var(--green-dark);color:var(--green)' : diff < 0 ? 'background:rgba(239,68,68,0.1);border:1px solid var(--red-dark);color:var(--red)' : 'background:var(--surface-light);color:var(--text-muted)') + '">' +
      (diff > 0 ? 'You would get $' + fmt(diff) + ' more back' : diff < 0 ? 'You would get $' + fmt(Math.abs(diff)) + ' less back' : 'No difference') +
      (taxDiff !== 0 ? ' <span style="font-size:12px;font-weight:400;opacity:0.8">(tax ' + (taxDiff < 0 ? 'saves' : 'costs') + ' $' + fmt(Math.abs(taxDiff)) + ')</span>' : '') +

          '<th style="text-align:right;padding:6px;color:var(--text-dim)">Current</th>' +
          '<th style="text-align:right;padding:6px;color:var(--text-dim)">Scenario</th>' +
          '<th style="text-align:right;padding:6px;color:var(--text-dim)">Diff</th>' +
        '</tr></thead>' +
        '<tbody>' +
          compareRow('Total Income', current.totalIncome, altResult.totalIncome) +
          compareRow('Adjustments', current.adjustments, altResult.adjustments) +
          compareRow('AGI', current.agi, altResult.agi) +
          compareRow('Deductions', current.deduction, altResult.deduction) +
          compareRow('Taxable Income', current.taxableIncome, altResult.taxableIncome) +
          compareRow('Income Tax', current.incomeTax, altResult.incomeTax) +
          creditsRow +
          compareRow('Total Tax', current.totalTax, altResult.totalTax) +
          compareRow('Total Payments', current.totalPayments, altResult.totalPayments) +
          stateRow +
        '</tbody></table>' +
    '</div></div>';
}

function answerQuestion(id) {
  const formHtml = getAssumptionForm(id);

  // Check if this is a paid question (first 3 interactive questions)
  if (formHtml && STATE.answeredQs.size < 3 && PAID_QUESTIONS <= 0) {
    // Need payment — redirect to Stripe
    if (STRIPE_PAYMENT_LINKS.three_questions) {
      window.location.href = STRIPE_PAYMENT_LINKS.three_questions;
      return;
    }
    // If no payment link configured, allow free access (beta mode)
  }

  // Deduct from paid questions if applicable
  if (formHtml && PAID_QUESTIONS > 0 && !STATE.answeredQs.has(id)) {
    PAID_QUESTIONS--;
    // Save to localStorage
    try {
      const payment = JSON.parse(localStorage.getItem('rmt_payment') || '{}');
      payment.usedQuestions = (payment.usedQuestions || 0) + 1;
      localStorage.setItem('rmt_payment', JSON.stringify(payment));
    } catch(e) {}
  }

  if (formHtml) {
    showAssumptionModal(id, formHtml);
  } else {
    STATE.answeredQs.add(id);
    try { sessionStorage.setItem('rmt_answered', JSON.stringify([...STATE.answeredQs])); } catch(e) {}
    render();
  }
}

function updateDepFields() {
  const container = document.getElementById('dep-details');
  if (!container) return;
  const numKids = parseInt(document.getElementById('modal-children')?.value) || 0;
  const numOther = parseInt(document.getElementById('modal-other-deps')?.value) || 0;
  const total = numKids + numOther;
  if (total === 0) { container.innerHTML = ''; return; }
  const deps = STATE.taxData.dependentDetails || [];
  let html = '<div style="margin-top:12px;margin-bottom:8px;color:var(--text-muted);font-size:13px;font-weight:600">Dependent Details (optional)</div>';
  for (let i = 0; i < total; i++) {
    const isChild = i < numKids;
    const existing = deps[i] || {};
    const label = isChild ? `Child ${i + 1}` : `Other Dependent ${i - numKids + 1}`;
    const credit = isChild ? '$2,000 CTC' : '$500 ODC';
    html += `<div style="display:flex;gap:8px;margin-bottom:8px;align-items:center">
      <input type="text" id="dep-name-${i}" placeholder="${label} first name" value="${esc(existing.name || '')}" style="flex:1;padding:8px;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:6px;font-size:13px;font-family:inherit">
      <select id="dep-rel-${i}" style="width:120px;padding:8px;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:6px;font-size:13px;font-family:inherit">
        <option value="child" ${(existing.relationship || 'child') === 'child' ? 'selected' : ''}>Child</option>
        <option value="stepchild" ${existing.relationship === 'stepchild' ? 'selected' : ''}>Stepchild</option>
        <option value="foster" ${existing.relationship === 'foster' ? 'selected' : ''}>Foster</option>
        <option value="sibling" ${existing.relationship === 'sibling' ? 'selected' : ''}>Sibling</option>
        <option value="parent" ${existing.relationship === 'parent' ? 'selected' : ''}>Parent</option>
        <option value="other" ${existing.relationship === 'other' ? 'selected' : ''}>Other</option>
      </select>
      <span style="color:var(--text-dim);font-size:11px;white-space:nowrap">${credit}</span>
    </div>`;
  }
  container.innerHTML = html;
}

function showAssumptionModal(id, formHtml) {
  const assumptionText = STATE.result.assumptions.find(a => a.id === id)?.text || '';
  const overlay = document.createElement('div');
  overlay.className = 'source-modal-overlay';
  overlay.id = 'assumption-modal';
  overlay.onclick = (e) => { if (e.target === overlay) closeAssumptionModal(); };
  overlay.innerHTML = `
    <div class="source-modal" style="height:auto;max-height:85vh;max-width:520px">
      <div class="source-modal-header">
        <div>
          <div class="title">Refine Your Return</div>
          <div class="filename">${assumptionText}</div>
        </div>
        <button class="close-btn" onclick="closeAssumptionModal()">Cancel</button>
      </div>
      <div class="source-modal-body" style="padding:20px;overflow-y:auto">
        ${formHtml}
        <div id="assumption-impact" style="background:var(--bg);border-radius:8px;padding:12px;margin-bottom:16px;display:none">
          <div style="color:var(--text-muted);font-size:12px;margin-bottom:4px">Impact on your return:</div>
          <div id="assumption-impact-text" style="font-size:16px;font-weight:700"></div>
        </div>
        <button onclick="applyAssumptionChange('${id}')" style="width:100%;padding:12px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit">
          Apply & Recalculate
        </button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);

  // Wire up itemized toggle if present
  const radios = overlay.querySelectorAll('input[name="deduction-type"]');
  radios.forEach(r => r.addEventListener('change', () => {
    const fields = document.getElementById('itemized-fields');
    if (fields) fields.style.display = r.value === 'itemized' && r.checked ? 'block' : 'none';
  }));

  // Initialize dependent detail fields if present
  if (id === 'dependents') setTimeout(updateDepFields, 0);
}

function closeAssumptionModal() {
  const el = document.getElementById('assumption-modal');
  if (el) el.remove();
}

function applyAssumptionChange(id) {
  const oldRefund = STATE.result.refundOrOwed;

  switch(id) {
    case 'filing_status': {
      const val = document.getElementById('modal-filing-status')?.value;
      if (val) STATE.taxData.filingStatus = val;
      break;
    }
    case 'dependents': {
      const children = parseInt(document.getElementById('modal-children')?.value) || 0;
      const otherDeps = parseInt(document.getElementById('modal-other-deps')?.value) || 0;
      STATE.taxData.numChildren = children;
      STATE.taxData.numOtherDeps = otherDeps;
      STATE.taxData.dependents = children + otherDeps;
      // Save dependent details
      const details = [];
      for (let i = 0; i < children + otherDeps; i++) {
        const name = document.getElementById('dep-name-' + i)?.value || '';
        const relationship = document.getElementById('dep-rel-' + i)?.value || (i < children ? 'child' : 'other');
        details.push({ name, relationship, isChild: i < children });
      }
      STATE.taxData.dependentDetails = details;
      break;
    }
    case 'no_credits': {
      STATE.taxData.educationCredit = parseFloat(document.getElementById('modal-edu-credit')?.value) || 0;
      STATE.taxData.eitc = parseFloat(document.getElementById('modal-eitc')?.value) || 0;
      break;
    }
    case 'no_hsa': {
      STATE.taxData.hsaContribution = parseFloat(document.getElementById('modal-hsa')?.value) || 0;
      STATE.taxData.iraContribution = parseFloat(document.getElementById('modal-ira')?.value) || 0;
      STATE.taxData.studentLoanInterest = parseFloat(document.getElementById('modal-student-loan')?.value) || 0;
      break;
    }
    case 'std_deduction': {
      const deductionType = document.querySelector('input[name="deduction-type"]:checked')?.value;
      if (deductionType === 'itemized') {
        STATE.taxData.itemized = {
          medical: parseFloat(document.getElementById('modal-medical')?.value) || 0,
          stateTaxes: parseFloat(document.getElementById('modal-salt')?.value) || 0,
          propertyTaxes: parseFloat(document.getElementById('modal-property')?.value) || 0,
          mortgageInterest: parseFloat(document.getElementById('modal-mortgage')?.value) || 0,
          charitableCash: parseFloat(document.getElementById('modal-charity-cash')?.value) || 0,
          charitableNonCash: parseFloat(document.getElementById('modal-charity-noncash')?.value) || 0,
        };
      } else {
        delete STATE.taxData.itemized;
      }
      break;
    }
    case 'estimated_payments': {
      STATE.taxData.estimatedPayments = parseFloat(document.getElementById('modal-est-payments')?.value) || 0;
      break;
    }
    case 'select_state': {
      const val = document.getElementById('modal-state')?.value;
      if (val !== undefined) STATE.taxData.stateCode = val;
      break;
    }
    case 'prior_refund': {
      STATE.taxData.priorRefund = parseFloat(document.getElementById('modal-prior-refund')?.value) || 0;
      break;
    }
    case 'other_income': {
      STATE.taxData.gamblingIncome = parseFloat(document.getElementById('modal-gambling')?.value) || 0;
      STATE.taxData.alimonyReceived = parseFloat(document.getElementById('modal-alimony-received')?.value) || 0;
      STATE.taxData.rentalIncome = parseFloat(document.getElementById('modal-rental')?.value) || 0;
      STATE.taxData.otherMiscIncome = parseFloat(document.getElementById('modal-other-misc')?.value) || 0;
      break;
    }
    case 'schedule_e': {
      const props = [];
      const descs = document.querySelectorAll('.sched-e-desc');
      const rents = document.querySelectorAll('.sched-e-rents');
      const mortgages = document.querySelectorAll('.sched-e-mortgage');
      const taxes = document.querySelectorAll('.sched-e-taxes');
      const insurance = document.querySelectorAll('.sched-e-insurance');
      const repairs = document.querySelectorAll('.sched-e-repairs');
      const depreciation = document.querySelectorAll('.sched-e-depreciation');
      const utilities = document.querySelectorAll('.sched-e-utilities');
      for (let i = 0; i < descs.length; i++) {
        props.push({
          description: descs[i]?.value || '',
          rents: parseFloat(rents[i]?.value) || 0,
          mortgage: parseFloat(mortgages[i]?.value) || 0,
          taxes: parseFloat(taxes[i]?.value) || 0,
          insurance: parseFloat(insurance[i]?.value) || 0,
          repairs: parseFloat(repairs[i]?.value) || 0,
          depreciation: parseFloat(depreciation[i]?.value) || 0,
          utilities: parseFloat(utilities[i]?.value) || 0,
        });
      }
      STATE.taxData.scheduleE = props.filter(p => p.rents > 0 || p.mortgage > 0);
      STATE.taxData.rentalIncome = 0;
      break;
    }
    case 'ptc': {
      STATE.taxData.premiumTaxCredit = {
        monthlyPremium: parseFloat(document.getElementById('modal-ptc-premium')?.value) || 0,
        slcspPremium: parseFloat(document.getElementById('modal-ptc-slcsp')?.value) || 0,
        advancePTC: parseFloat(document.getElementById('modal-ptc-advance')?.value) || 0,
      };
      break;
    }
    case 'other_deductions': {
      STATE.taxData.educatorExpenses = parseFloat(document.getElementById('modal-educator')?.value) || 0;
      STATE.taxData.alimonyPaid = parseFloat(document.getElementById('modal-alimony-paid')?.value) || 0;
      STATE.taxData.movingExpenses = parseFloat(document.getElementById('modal-moving')?.value) || 0;
      break;
    }
    case 'other_credits': {
      STATE.taxData.childCareCredit = parseFloat(document.getElementById('modal-childcare')?.value) || 0;
      STATE.taxData.saversCredit = parseFloat(document.getElementById('modal-savers')?.value) || 0;
      STATE.taxData.energyCredit = parseFloat(document.getElementById('modal-energy')?.value) || 0;
      break;
    }
    case 'sched_c_expenses': {
      if (STATE.taxData.scheduleC) {
        STATE.taxData.scheduleC.advertising = parseFloat(document.getElementById('modal-biz-advertising')?.value) || 0;
        STATE.taxData.scheduleC.carExpense = parseFloat(document.getElementById('modal-biz-car')?.value) || 0;
        STATE.taxData.scheduleC.insurance = parseFloat(document.getElementById('modal-biz-insurance')?.value) || 0;
        STATE.taxData.scheduleC.officeExpense = parseFloat(document.getElementById('modal-biz-office')?.value) || 0;
        STATE.taxData.scheduleC.rent = parseFloat(document.getElementById('modal-biz-rent')?.value) || 0;
        STATE.taxData.scheduleC.supplies = parseFloat(document.getElementById('modal-biz-supplies')?.value) || 0;
        STATE.taxData.scheduleC.travel = parseFloat(document.getElementById('modal-biz-travel')?.value) || 0;
        STATE.taxData.scheduleC.meals = parseFloat(document.getElementById('modal-biz-meals')?.value) || 0;
        STATE.taxData.scheduleC.utilities = parseFloat(document.getElementById('modal-biz-utilities')?.value) || 0;
        STATE.taxData.scheduleC.otherExpenses = parseFloat(document.getElementById('modal-biz-other')?.value) || 0;
      }
      break;
    }
  }

  // Recalculate
  STATE.result = computeTaxReturn(STATE.taxData);
  STATE.answeredQs.add(id);
  try { sessionStorage.setItem('rmt_answered', JSON.stringify([...STATE.answeredQs])); } catch(e) {}
  closeAssumptionModal();
  STATE.tab = 'return';
  render();

  // Show impact toast and scroll to result
  const newRefund = STATE.result.refundOrOwed;
  const diff = newRefund - oldRefund;
  if (diff !== 0) {
    showImpactToast(diff);
  }
  // Scroll to the refund/owed box after a brief delay for rendering
  setTimeout(() => {
    const refundBox = document.querySelector('.refund-box');
    if (refundBox) refundBox.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }, 300);
}

function showToast(message, type) {
  document.querySelectorAll('.app-toast').forEach(t => t.remove());
  const toast = document.createElement('div');
  toast.className = `app-toast ${type || 'info'}`;
  toast.textContent = message;
  document.body.appendChild(toast);
  setTimeout(() => { toast.style.opacity = '0'; toast.style.transition = 'opacity 0.5s'; setTimeout(() => toast.remove(), 500); }, 3000);
}

function showImpactToast(diff) {
  if (diff > 0) {
    showToast(`Refund increased by $${fmt(diff)}`, 'success');
  } else if (diff < 0) {
    showToast(`Refund decreased by $${fmt(Math.abs(diff))}`, 'error');
  }
}

function shareSummary() {
  const r = STATE.result;
  if (!r) return;
  const summary = [
    `Tax Return Draft Summary (${TAX.year})`,
    `Filing Status: ${FS_LABELS[r.filingStatus]}`,
    `Total Income: $${fmt(r.totalIncome)}`,
    `Adjusted Gross Income: $${fmt(r.agi)}`,
    `Deductions: $${fmt(r.deduction)} (${r.usingItemized ? 'Itemized' : 'Standard'})`,
    `Taxable Income: $${fmt(r.taxableIncome)}`,
    `Total Tax: $${fmt(r.totalTax)}`,
    `Total Payments: $${fmt(r.totalPayments)}`,
    r.refundOrOwed >= 0 ? `Estimated Refund: $${fmt(r.refundOrOwed)}` : `Amount Owed: $${fmt(Math.abs(r.refundOrOwed))}`,
    `Effective Rate: ${r.effectiveRate.toFixed(1)}% | Marginal Rate: ${r.marginalRate}%`,
    ...(r.stateResult && r.stateResult.tax > 0 ? [
      '',
      `${r.stateResult.stateName} State Tax: $${fmt(r.stateResult.tax)}`,
      r.stateResult.refundOrOwed >= 0 ? `State Refund: $${fmt(r.stateResult.refundOrOwed)}` : `State Owed: $${fmt(Math.abs(r.stateResult.refundOrOwed))}`,
    ] : []),
    '',
    'Generated at reviewmytaxes.com — DRAFT, NOT FOR FILING',
  ].join('\n');

  if (navigator.clipboard) {
    navigator.clipboard.writeText(summary).then(() => {
      showToast('Summary copied to clipboard', 'info');
    }).catch(() => {
      showToast('Could not copy — try Ctrl+C', 'error');
    });
  } else {
    const ta = document.createElement('textarea');
    ta.value = summary;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    ta.remove();
    showToast('Summary copied to clipboard', 'info');
  }
}

function downloadSummary() {
  const r = STATE.result;
  if (!r) return;
  const lines = [
    '═══════════════════════════════════════════════════════',
    '  DRAFT TAX RETURN SUMMARY — NOT FOR FILING',
    `  Tax Year ${TAX.year} · Generated ${new Date().toLocaleDateString()}`,
    '═══════════════════════════════════════════════════════',
    '',
    `Filing Status:         ${FS_LABELS[r.filingStatus]}`,
    '',
    '── INCOME ──────────────────────────────────────────────',
  ];
  r.w2s.forEach((w, i) => lines.push(`  W-2 (${w.employer || 'Employer '+(i+1)}): Wages $${fmt(w.wages)}, Fed WH $${fmt(w.fedWithheld)}`));
  if (r.totalInterest > 0) lines.push(`  Interest income:       $${fmt(r.totalInterest)}`);
  if (r.totalOrdDiv > 0) lines.push(`  Ordinary dividends:    $${fmt(r.totalOrdDiv)}`);
  if (r.totalRetirement > 0) lines.push(`  Retirement (1099-R):   $${fmt(r.totalRetirement)}`);
  if (r.ssaBenefits > 0) { lines.push(`  SS benefits (SSA-1099): $${fmt(r.ssaBenefits)}`); lines.push(`  SS taxable amount:     $${fmt(r.ssaTaxable)}`); }
  if (r.schedCNet !== 0) lines.push(`  Business income (C):   $${fmt(r.schedCNet)}`);
  if (r.schedENet !== 0) lines.push(`  Rental income (E):     $${fmt(r.schedENet)}`);
  if (r.netSTCG + r.netLTCG !== 0) lines.push(`  Capital gains/losses:  $${fmt(r.netSTCG + r.netLTCG)}`);
  if (r.otherIncome > 0) lines.push(`  Other income:          $${fmt(r.otherIncome)}`);
  lines.push(`  Total Income:          $${fmt(r.totalIncome)}`);
  lines.push('');
  lines.push('── DEDUCTIONS & TAXABLE INCOME ─────────────────────────');
  lines.push(`  Adjustments:           $${fmt(r.adjustments)}`);
  lines.push(`  AGI:                   $${fmt(r.agi)}`);
  lines.push(`  Deduction (${r.usingItemized ? 'Itemized' : 'Standard'}):  $${fmt(r.deduction)}`);
  if (r.qbiDeduction > 0) lines.push(`  QBI Deduction:         $${fmt(r.qbiDeduction)}`);
  lines.push(`  Taxable Income:        $${fmt(r.taxableIncome)}`);
  lines.push('');
  lines.push('── TAX CALCULATION ─────────────────────────────────────');
  lines.push(`  Income Tax:            $${fmt(r.incomeTax)}`);
  if (r.seTax > 0) lines.push(`  SE Tax:                $${fmt(r.seTax)}`);
  if (r.niit > 0) lines.push(`  NIIT:                  $${fmt(r.niit)}`);
  if (r.amt > 0) lines.push(`  AMT:                   $${fmt(r.amt)}`);
  lines.push(`  Total Tax:             $${fmt(r.totalTax)}`);
  lines.push('');
  lines.push('── PAYMENTS & RESULT ───────────────────────────────────');
  lines.push(`  Federal Withheld:      $${fmt(r.totalFedWithheld)}`);
  if (r.estimatedPayments > 0) lines.push(`  Estimated Payments:    $${fmt(r.estimatedPayments)}`);
  if (r.ptcReconciliation !== 0) lines.push(`  PTC Reconciliation:    $${fmt(r.ptcReconciliation)}`);
  lines.push(`  Total Payments:        $${fmt(r.totalPayments)}`);
  lines.push('');
  lines.push(`  ${r.refundOrOwed >= 0 ? 'ESTIMATED REFUND' : 'AMOUNT OWED'}:      $${fmt(Math.abs(r.refundOrOwed))}`);
  lines.push(`  Effective Rate:        ${r.effectiveRate.toFixed(1)}%`);
  lines.push(`  Marginal Rate:         ${r.marginalRate}%`);
  if (r.stateResult && r.stateResult.tax > 0) {
    lines.push('');
    lines.push('── STATE TAX (' + r.stateResult.stateName.toUpperCase() + ') ────────────────────────────');
    lines.push(`  State AGI:             $${fmt(r.stateResult.stateAGI)}`);
    lines.push(`  State Deduction:       $${fmt(r.stateResult.deduction)}`);
    lines.push(`  State Taxable Income:  $${fmt(r.stateResult.taxableIncome)}`);
    lines.push(`  State Tax:             $${fmt(r.stateResult.tax)}`);
    if (r.stateResult.withheld > 0) lines.push(`  State Withheld:        $${fmt(r.stateResult.withheld)}`);
    lines.push(`  ${r.stateResult.refundOrOwed >= 0 ? 'STATE REFUND' : 'STATE OWED'}:          $${fmt(Math.abs(r.stateResult.refundOrOwed))}`);
    lines.push(`  State Effective Rate:  ${r.stateResult.effectiveRate.toFixed(1)}%`);
  }
  lines.push('');
  lines.push('═══════════════════════════════════════════════════════');
  lines.push('  DRAFT — NOT FOR FILING');
  lines.push('  Generated by ReviewMyTaxes · ' + APP_VERSION);
  lines.push('  This is an estimate only. Consult a tax professional.');
  lines.push('═══════════════════════════════════════════════════════');

  const blob = new Blob([lines.join('\n')], { type: 'text/plain' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `tax-draft-${TAX.year}-summary.txt`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('Summary downloaded', 'success');
}

function runPrivacyAudit() {
  const results = [];
  // Check cookies
  results.push(document.cookie.length === 0 ? '✓ No cookies found' : '✗ Cookies detected: ' + document.cookie);
  // Check localStorage
  try {
    const lsKeys = Object.keys(localStorage);
    results.push(lsKeys.length === 0 ? '✓ localStorage is empty' : '✗ localStorage has ' + lsKeys.length + ' key(s)');
  } catch(e) { results.push('✓ localStorage not accessible'); }
  // Check sessionStorage
  try {
    const ssKeys = Object.keys(sessionStorage);
    results.push(ssKeys.length === 0 ? '✓ sessionStorage is empty' : '✗ sessionStorage has ' + ssKeys.length + ' key(s)');
  } catch(e) { results.push('✓ sessionStorage not accessible'); }
  // Check service workers
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.getRegistrations().then(regs => {
      results.push(regs.length === 0 ? '✓ No service workers registered' : '✗ ' + regs.length + ' service worker(s) found');
      showAuditResults(results);
    });
  } else {
    results.push('✓ Service workers not supported (extra safe)');
    showAuditResults(results);
  }
  // Network intercepts
  results.push(STATE.networkSafe ? '✓ Zero unauthorized outbound requests detected' : '✗ ' + STATE.networkRequests + ' request(s) were blocked');
  results.push('✓ fetch(), XHR, sendBeacon, WebSocket all monitored');
}

function showAuditResults(results) {
  const el = document.getElementById('audit-result');
  if (el) {
    el.innerHTML = '<div style="text-align:left;background:var(--bg);border-radius:6px;padding:10px;margin-top:4px;font-family:monospace">' +
      results.map(r => `<div style="color:${r.startsWith('✓') ? 'var(--green)' : 'var(--red)'}">${r}</div>`).join('') +
      '</div><div style="color:var(--green);font-weight:600;margin-top:8px">Audit complete — ' +
      new Date().toLocaleTimeString() + '</div>';
  }
}
