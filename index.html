    if (fields) fields.style.display = r.value === 'yes' && r.checked ? 'block' : 'none';
  }));

  // Initialize dependent detail fields if present
  if (id === 'dependents') setTimeout(updateDepFields, 0);
}

function closeAssumptionModal() {
  const el = document.getElementById('assumption-modal');
  if (el) el.remove();
}

function applyAssumptionChange(id) {
  rlog('APPLY_CHANGE', { id, screen: STATE.screen, tab: STATE.tab });
  const oldRefund = STATE.result.refundOrOwed;

  switch(id) {
    case 'filing_status': {
      const val = document.getElementById('modal-filing-status')?.value;
      if (val) STATE.taxData.filingStatus = val;
      break;
    }
    case 'dependents': {
      const children = parseInt(document.getElementById('modal-children')?.value) || 0;
      const otherDeps = parseInt(document.getElementById('modal-other-deps')?.value) || 0;
      STATE.taxData.numChildren = children;
      STATE.taxData.numOtherDeps = otherDeps;
      STATE.taxData.dependents = children + otherDeps;
      // Save dependent details
      const details = [];
      for (let i = 0; i < children + otherDeps; i++) {
        const name = document.getElementById('dep-name-' + i)?.value || '';
        const relationship = document.getElementById('dep-rel-' + i)?.value || (i < children ? 'child' : 'other');
        details.push({ name, relationship, isChild: i < children });
      }
      STATE.taxData.dependentDetails = details;
      break;
    }
    case 'no_credits': {
      STATE.taxData.educationCredit = parseFloat(document.getElementById('modal-edu-credit')?.value) || 0;
      STATE.taxData.eitc = parseFloat(document.getElementById('modal-eitc')?.value) || 0;
      break;
    }
    case 'no_hsa': {
      STATE.taxData.hsaContribution = parseFloat(document.getElementById('modal-hsa')?.value) || 0;
      STATE.taxData.iraContribution = parseFloat(document.getElementById('modal-ira')?.value) || 0;
      STATE.taxData.studentLoanInterest = parseFloat(document.getElementById('modal-student-loan')?.value) || 0;
      break;
    }
    case 'std_deduction': {
      const deductionType = document.querySelector('input[name="deduction-type"]:checked')?.value;
      if (deductionType === 'itemized') {
        STATE.taxData.itemized = {
          medical: parseFloat(document.getElementById('modal-medical')?.value) || 0,
          stateTaxes: parseFloat(document.getElementById('modal-salt')?.value) || 0,
          propertyTaxes: parseFloat(document.getElementById('modal-property')?.value) || 0,
          mortgageInterest: parseFloat(document.getElementById('modal-mortgage')?.value) || 0,
          charitableCash: parseFloat(document.getElementById('modal-charity-cash')?.value) || 0,
          charitableNonCash: parseFloat(document.getElementById('modal-charity-noncash')?.value) || 0,
        };
      } else {
        delete STATE.taxData.itemized;
      }
      break;
    }
    case 'estimated_payments': {
      STATE.taxData.estimatedPayments = parseFloat(document.getElementById('modal-est-payments')?.value) || 0;
      break;
    }
    case 'select_state': {
      const val = document.getElementById('modal-state')?.value;
      if (val !== undefined) STATE.taxData.stateCode = val;
      break;
    }
    case 'prior_refund': {
      STATE.taxData.priorRefund = parseFloat(document.getElementById('modal-prior-refund')?.value) || 0;
      break;
    }
    case 'other_income': {
      STATE.taxData.gamblingIncome = parseFloat(document.getElementById('modal-gambling')?.value) || 0;
      STATE.taxData.alimonyReceived = parseFloat(document.getElementById('modal-alimony-received')?.value) || 0;
      STATE.taxData.rentalIncome = parseFloat(document.getElementById('modal-rental')?.value) || 0;
      STATE.taxData.otherMiscIncome = parseFloat(document.getElementById('modal-other-misc')?.value) || 0;
      break;
    }
    case 'schedule_e': {
      const props = [];
      const descs = document.querySelectorAll('.sched-e-desc');
      const rents = document.querySelectorAll('.sched-e-rents');
      const mortgages = document.querySelectorAll('.sched-e-mortgage');
      const taxes = document.querySelectorAll('.sched-e-taxes');
      const insurance = document.querySelectorAll('.sched-e-insurance');
      const repairs = document.querySelectorAll('.sched-e-repairs');
      const depreciation = document.querySelectorAll('.sched-e-depreciation');
      const utilities = document.querySelectorAll('.sched-e-utilities');
      for (let i = 0; i < descs.length; i++) {
        props.push({
          description: descs[i]?.value || '',
          rents: parseFloat(rents[i]?.value) || 0,
          mortgage: parseFloat(mortgages[i]?.value) || 0,
          taxes: parseFloat(taxes[i]?.value) || 0,
          insurance: parseFloat(insurance[i]?.value) || 0,
          repairs: parseFloat(repairs[i]?.value) || 0,
          depreciation: parseFloat(depreciation[i]?.value) || 0,
          utilities: parseFloat(utilities[i]?.value) || 0,
        });
      }
      STATE.taxData.scheduleE = props.filter(p => p.rents > 0 || p.mortgage > 0);
      STATE.taxData.rentalIncome = 0;
      break;
    }
    case 'ptc': {
      STATE.taxData.premiumTaxCredit = {
        monthlyPremium: parseFloat(document.getElementById('modal-ptc-premium')?.value) || 0,
        slcspPremium: parseFloat(document.getElementById('modal-ptc-slcsp')?.value) || 0,
        advancePTC: parseFloat(document.getElementById('modal-ptc-advance')?.value) || 0,
      };
      break;
    }
    case 'other_deductions': {
      STATE.taxData.educatorExpenses = parseFloat(document.getElementById('modal-educator')?.value) || 0;
      STATE.taxData.alimonyPaid = parseFloat(document.getElementById('modal-alimony-paid')?.value) || 0;
      STATE.taxData.movingExpenses = parseFloat(document.getElementById('modal-moving')?.value) || 0;
      break;
    }
    case 'other_credits': {
      STATE.taxData.childCareCredit = parseFloat(document.getElementById('modal-childcare')?.value) || 0;
      STATE.taxData.saversCredit = parseFloat(document.getElementById('modal-savers')?.value) || 0;
      STATE.taxData.energyCredit = parseFloat(document.getElementById('modal-energy')?.value) || 0;
      break;
    }
    case 'no_home_sale': {
      const salePrice = parseFloat(document.getElementById('modal-home-sale-price')?.value) || 0;
      const basis = parseFloat(document.getElementById('modal-home-basis')?.value) || 0;
      if (salePrice > 0) {
        STATE.taxData.homeSale = { salePrice, basis };
      } else {
        delete STATE.taxData.homeSale;
      }
      break;
    }
    case 'exchange_1031': {
      const rFMV = parseFloat(document.getElementById('modal-1031-relinquished-fmv')?.value) || 0;
      const rBasis = parseFloat(document.getElementById('modal-1031-relinquished-basis')?.value) || 0;
      const repFMV = parseFloat(document.getElementById('modal-1031-replacement-fmv')?.value) || 0;
      const bootRcvd = parseFloat(document.getElementById('modal-1031-boot-received')?.value) || 0;
      const bootPd = parseFloat(document.getElementById('modal-1031-boot-paid')?.value) || 0;
      const desc1031 = document.getElementById('modal-1031-desc')?.value || '';
      if (rFMV > 0) {
        STATE.taxData.exchange1031 = { description: desc1031, relinquishedFMV: rFMV, relinquishedBasis: rBasis, replacementFMV: repFMV, bootReceived: bootRcvd, bootPaid: bootPd };
      } else {
        delete STATE.taxData.exchange1031;
      }
      break;
    }
    case 'qcd': {
      STATE.taxData.qcd = parseFloat(document.getElementById('modal-qcd')?.value) || 0;
      break;
    }
    case 'education_expenses': {
      STATE.taxData.studentLoanInterest = parseFloat(document.getElementById('modal-student-loan2')?.value) || 0;
      STATE.taxData.tuitionPaid = parseFloat(document.getElementById('modal-tuition')?.value) || 0;
      STATE.taxData.numStudents = parseInt(document.getElementById('modal-num-students')?.value) || 0;
      // Auto-calculate education credit if tuition entered
      if (STATE.taxData.tuitionPaid > 0 && STATE.taxData.numStudents > 0) {
        // AOTC: 100% of first $2k + 25% of next $2k = max $2,500 per student
        const perStudent = Math.min(STATE.taxData.tuitionPaid / STATE.taxData.numStudents, 4000);
        const aotcPerStudent = Math.min(perStudent, 2000) + Math.min(Math.max(0, perStudent - 2000), 2000) * 0.25;
        STATE.taxData.educationCredit = Math.round(aotcPerStudent * STATE.taxData.numStudents);
      }
      break;
    }
    case 'crypto': {
      const answer = document.querySelector('input[name="crypto-answer"]:checked')?.value;
      STATE.taxData.cryptoTransactions = answer === 'yes';
      if (STATE.taxData.cryptoTransactions) {
        STATE.taxData.cryptoGain = parseFloat(document.getElementById('modal-crypto-gain')?.value) || 0;
        // Add to capital gains
        if (STATE.taxData.cryptoGain !== 0) {
          if (!STATE.taxData.capitalGains) STATE.taxData.capitalGains = [];
          // Remove old crypto entry if exists
          STATE.taxData.capitalGains = STATE.taxData.capitalGains.filter(t => t.description !== 'Digital Assets (crypto)');
          STATE.taxData.capitalGains.push({
            description: 'Digital Assets (crypto)',
            dateAcquired: 'Various', dateSold: String(TAX.year),
            proceeds: Math.max(0, STATE.taxData.cryptoGain),
            basis: Math.max(0, -STATE.taxData.cryptoGain),
            longTerm: true,
          });
        }
      }
      break;
    }
    case 'sched_c_expenses': {
      if (STATE.taxData.scheduleC) {
        STATE.taxData.scheduleC.advertising = parseFloat(document.getElementById('modal-biz-advertising')?.value) || 0;
        STATE.taxData.scheduleC.carExpense = parseFloat(document.getElementById('modal-biz-car')?.value) || 0;
        STATE.taxData.scheduleC.insurance = parseFloat(document.getElementById('modal-biz-insurance')?.value) || 0;
        STATE.taxData.scheduleC.officeExpense = parseFloat(document.getElementById('modal-biz-office')?.value) || 0;
        STATE.taxData.scheduleC.rent = parseFloat(document.getElementById('modal-biz-rent')?.value) || 0;
        STATE.taxData.scheduleC.supplies = parseFloat(document.getElementById('modal-biz-supplies')?.value) || 0;
        STATE.taxData.scheduleC.travel = parseFloat(document.getElementById('modal-biz-travel')?.value) || 0;
        STATE.taxData.scheduleC.meals = parseFloat(document.getElementById('modal-biz-meals')?.value) || 0;
        STATE.taxData.scheduleC.utilities = parseFloat(document.getElementById('modal-biz-utilities')?.value) || 0;
        STATE.taxData.scheduleC.otherExpenses = parseFloat(document.getElementById('modal-biz-other')?.value) || 0;
      }
      break;
    }
  }

  // Recalculate
  STATE.result = safeCompute(STATE.taxData);
  STATE.answeredQs.add(id);
  saveAnswered();
  closeAssumptionModal();
  STATE.tab = 'return';
  render();

  // Show impact toast and scroll to result
  const newRefund = STATE.result.refundOrOwed;
  const diff = newRefund - oldRefund;
  if (diff !== 0) {
    showImpactToast(diff);
  }
  // Scroll to the refund/owed box after a brief delay for rendering
  setTimeout(() => {
    const refundBox = document.querySelector('.refund-box');
    if (refundBox) refundBox.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }, 300);
}

function shareSummary() {
  const r = STATE.result;
  if (!r) return;
  const summary = [
    `Tax Return Draft Summary (${TAX.year})`,
    `Filing Status: ${FS_LABELS[r.filingStatus]}`,
    `Total Income: $${fmt(r.totalIncome)}`,
    `Adjusted Gross Income: $${fmt(r.agi)}`,
    `Deductions: $${fmt(r.deduction)} (${r.usingItemized ? 'Itemized' : 'Standard'})`,
    `Taxable Income: $${fmt(r.taxableIncome)}`,
    `Total Tax: $${fmt(r.totalTax)}`,
    `Total Payments: $${fmt(r.totalPayments)}`,
    r.refundOrOwed >= 0 ? `Estimated Refund: $${fmt(r.refundOrOwed)}` : `Amount Owed: $${fmt(Math.abs(r.refundOrOwed))}`,
    `Effective Rate: ${r.effectiveRate.toFixed(1)}% | Marginal Rate: ${r.marginalRate}%`,
    ...(r.stateResult && r.stateResult.tax > 0 ? [
      '',
      `${r.stateResult.stateName} State Tax: $${fmt(r.stateResult.tax)}`,
      r.stateResult.refundOrOwed >= 0 ? `State Refund: $${fmt(r.stateResult.refundOrOwed)}` : `State Owed: $${fmt(Math.abs(r.stateResult.refundOrOwed))}`,
    ] : []),
    '',
    'Generated at reviewmytaxes.com — DRAFT, NOT FOR FILING',
  ].join('\n');

  if (navigator.clipboard) {
    navigator.clipboard.writeText(summary).then(() => {
      showToast('Summary copied to clipboard', 'info');
    }).catch(() => {
      showToast('Could not copy — try Ctrl+C', 'error');
    });
  } else {
    const ta = document.createElement('textarea');
    ta.value = summary;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    ta.remove();
    showToast('Summary copied to clipboard', 'info');
  }
}

  let rows = '';

  r.w2s.forEach((w, i) => { rows += row('W-2: ' + (w.employer || 'Employer ' + (i+1)), '$' + fmt(w.wages)); });
  if (r.totalInterest > 0) rows += row('2b. Taxable interest', '$' + fmt(r.totalInterest));
  if (r.totalOrdDiv > 0) rows += row('3a. Ordinary dividends', '$' + fmt(r.totalOrdDiv));

  if (r.schedENet !== 0) rows += row('Schedule E rental income', '$' + fmt(r.schedENet));
  rows += row('9. Total income', '$' + fmt(r.totalIncome), true);

  rows += section('Adjustments & Deductions');
  if (r.adjustments > 0) rows += row('10. Adjustments', '$' + fmt(r.adjustments));
  rows += row('11. AGI', '$' + fmt(r.agi), true);
  rows += row('12. ' + (r.usingItemized ? 'Itemized' : 'Standard') + ' deduction', '$' + fmt(r.deduction));
  if (r.qbiDeduction > 0) rows += row('13. QBI deduction', '$' + fmt(r.qbiDeduction));

  rows += section('Tax Computation');

  if (r.niit > 0) rows += row('NIIT (3.8%)', '$' + fmt(r.niit));

  if (r.stateResult && r.stateResult.tax > 0) {

function runPrivacyAudit() {
  const results = [];
  // Check cookies
  results.push(document.cookie.length === 0 ? '✓ No cookies found' : '✗ Cookies detected: ' + document.cookie);
  // Check localStorage
  try {
    const lsKeys = Object.keys(localStorage);
    results.push(lsKeys.length === 0 ? '✓ localStorage is empty' : '✗ localStorage has ' + lsKeys.length + ' key(s)');
  } catch(e) { results.push('✓ localStorage not accessible'); }
  // Check sessionStorage
  try {
    const ssKeys = Object.keys(sessionStorage);
    results.push(ssKeys.length === 0 ? '✓ sessionStorage is empty' : '✗ sessionStorage has ' + ssKeys.length + ' key(s)');
  } catch(e) { results.push('✓ sessionStorage not accessible'); }
  // Check service workers
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.getRegistrations().then(regs => {
      results.push(regs.length === 0 ? '✓ No service workers registered' : '✗ ' + regs.length + ' service worker(s) found');
      showAuditResults(results);
    });
  } else {
    results.push('✓ Service workers not supported (extra safe)');
    showAuditResults(results);
  }
  // Network intercepts
  results.push(STATE.networkSafe ? '✓ Zero unauthorized outbound requests detected' : '✗ ' + STATE.networkRequests + ' request(s) were blocked');
  results.push('✓ fetch(), XHR, sendBeacon, WebSocket all monitored');
}

function showAuditResults(results) {
  const el = document.getElementById('audit-result');
  if (el) {
    el.innerHTML = '<div style="text-align:left;background:var(--bg);border-radius:6px;padding:10px;margin-top:4px;font-family:monospace">' +
      results.map(r => `<div style="color:${r.startsWith('✓') ? 'var(--green)' : 'var(--red)'}">${r}</div>`).join('') +
      '</div><div style="color:var(--green);font-weight:600;margin-top:8px">Audit complete — ' +
      new Date().toLocaleTimeString() + '</div>';
  }
}

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    const changelog = document.getElementById('changelog-modal');
    if (changelog) { changelog.remove(); return; }
    const assumptionModal = document.getElementById('assumption-modal');
    if (assumptionModal) { closeAssumptionModal(); return; }
    closeSourceDoc();
  }
  // Ctrl+Shift+L = show debug log
  if (e.ctrlKey && e.shiftKey && e.key === 'L') {
    e.preventDefault();
    showDebugLog();
  }
  // Number keys for quick tab switching (only in review mode, not when typing in inputs)
  if (STATE.screen === 'review' && !e.target.matches('input, textarea, select') && !e.ctrlKey && !e.metaKey) {
    const tabKeys = { '1': 'return', '2': 'assumptions', '3': 'documents', '4': 'pricing', '5': 'compare' };
    if (tabKeys[e.key]) { e.preventDefault(); setTab(tabKeys[e.key]); return; }
    if (e.key === '?') { e.preventDefault(); showKeyboardHelp(); return; }
    if (e.key === 'p' || e.key === 'P') { e.preventDefault(); downloadPDF(); return; }
    if (e.key === 't' || e.key === 'T') { e.preventDefault(); toggleTheme(); render(); return; }
  }
  // Arrow key tab navigation when a tab button is focused
  if ((e.key === 'ArrowLeft' || e.key === 'ArrowRight') && e.target.classList.contains('tab-btn')) {
    const tabs = ['return', 'assumptions', 'documents', 'pricing', 'compare'];
    const idx = tabs.indexOf(STATE.tab);
    if (idx !== -1) {
      const newIdx = e.key === 'ArrowRight' ? (idx + 1) % tabs.length : (idx - 1 + tabs.length) % tabs.length;
      setTab(tabs[newIdx]);
      setTimeout(() => {
        const btns = document.querySelectorAll('.tab-btn');
        if (btns[newIdx]) btns[newIdx].focus();
      }, 50);
    }
  }
});

function showPaymentReturnBanner(questionId) {
  const banner = document.createElement('div');
  banner.id = 'payment-return-banner';
  banner.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:9999;background:linear-gradient(135deg,#22c55e,#16a34a);padding:12px 20px;display:flex;justify-content:center;align-items:center;gap:12px;flex-wrap:wrap;box-shadow:0 4px 20px rgba(0,0,0,0.3)';
  banner.innerHTML = `
    <span style="color:#fff;font-size:14px;font-weight:600">Just completed your $5 payment?</span>
    <button onclick="confirmPaymentReturn('${questionId}')" style="padding:8px 20px;background:#fff;color:#16a34a;border:none;border-radius:6px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit">Yes — open my question</button>
    <button onclick="dismissPaymentBanner()" style="padding:8px 12px;background:rgba(255,255,255,0.2);color:#fff;border:none;border-radius:6px;font-size:13px;cursor:pointer;font-family:inherit">Dismiss</button>
  `;
  document.body.appendChild(banner);
}

function confirmPaymentReturn(questionId) {
  rlog('MANUAL_PAYMENT_CONFIRM', questionId);
  // Grant the credit manually
  const existing = JSON.parse(localStorage.getItem('rmt_payment') || '{}');
  const currentPaid = (existing.paidQuestions || 0);
  const currentUsed = (existing.usedQuestions || 0);
  localStorage.setItem('rmt_payment', JSON.stringify({
    paidQuestions: currentPaid + 1,
    usedQuestions: currentUsed,
    timestamp: Date.now()
  }));
  PAID_QUESTIONS = (currentPaid + 1) - currentUsed;
  localStorage.removeItem('rmt_pending_question');
  // Remove banner
  const banner = document.getElementById('payment-return-banner');
  if (banner) banner.remove();
  // Open the question
  STATE.tab = 'assumptions';
  render();
  setTimeout(() => answerQuestion(questionId), 300);
}

function dismissPaymentBanner() {
  localStorage.removeItem('rmt_pending_question');
  const banner = document.getElementById('payment-return-banner');
  if (banner) banner.remove();
}
</script>
