<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="ReviewMyTaxes — Schedules & Forms">
<title>ReviewMyTaxes — Schedules & Forms</title>
<script src="https://js.stripe.com/v3/"></script>
<link rel="stylesheet" href="css/shared.css">
<style>
  .sched-nav { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:20px; }
  .sched-nav-btn { padding:8px 16px; border:1px solid var(--border); border-radius:8px; background:var(--surface); color:var(--text-muted); font-size:13px; font-weight:600; cursor:pointer; font-family:inherit; transition:all 0.2s; }
  .sched-nav-btn.active { background:var(--accent); color:#fff; border-color:var(--accent); }
  .sched-nav-btn:hover { border-color:var(--accent); color:var(--accent-light); }
  .sched-section { display:none; }
  .sched-section.active { display:block; }
  .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:16px; }
  .form-field label { display:block; color:var(--text-dim); font-size:12px; margin-bottom:4px; }
  .form-field input, .form-field select { width:100%; padding:8px; background:var(--bg); color:var(--text); border:1px solid var(--border); border-radius:6px; font-size:13px; font-family:inherit; box-sizing:border-box; }
  .form-field input:focus, .form-field select:focus { border-color:var(--accent); outline:none; }
  .result-box { margin-top:16px; padding:16px; background:rgba(59,130,246,0.06); border:1px solid var(--accent); border-radius:10px; }
  .result-line { display:flex; justify-content:space-between; padding:4px 0; font-size:13px; }
  .result-line.bold { font-weight:700; }
  .result-line .label { color:var(--text-muted); }
  .result-line .value { color:var(--text); font-weight:600; }
  .result-line .value.green { color:var(--green); }
  .result-line .value.red { color:var(--red); }
  .save-bar { position:sticky; bottom:0; padding:16px; background:var(--bg); border-top:1px solid var(--border); display:flex; gap:12px; justify-content:center; z-index:10; }
  .btn-save { padding:12px 32px; background:var(--green); color:#fff; border:none; border-radius:8px; font-size:15px; font-weight:700; cursor:pointer; font-family:inherit; }
  .btn-save:hover { filter:brightness(1.1); }
  .btn-back-link { padding:12px 24px; background:var(--surface); color:var(--text-muted); border:1px solid var(--border); border-radius:8px; font-size:14px; font-weight:600; cursor:pointer; font-family:inherit; text-decoration:none; display:inline-block; }
  .add-row-btn { width:100%; padding:8px; background:var(--surface); color:var(--accent-light); border:1px dashed var(--border); border-radius:6px; font-size:12px; cursor:pointer; font-family:inherit; margin-top:8px; }
  .remove-btn { background:none; border:none; color:var(--red); cursor:pointer; font-size:14px; padding:4px 8px; }
  @media(max-width:600px) {
    .form-grid { grid-template-columns:1fr; }
  }
</style>
</head>
<body>
<div id="app"></div>

<script src="js/shared-state.js"></script>
<script src="js/tax-engine.js"></script>
<script src="js/shared-ui.js"></script>
<script>
const app = document.getElementById('app');

// Alias for cross-tab sync handler in shared-state.js
function render() { if (typeof renderSchedules === 'function') renderSchedules(); }

// Load state from localStorage
loadAnswered();
if (!loadTaxData() || !STATE.taxData) {
  app.innerHTML = `
    <div class="container" style="text-align:center;padding:60px 20px">
      <h1 style="color:var(--text);font-size:28px;margin-bottom:16px">No Tax Data Found</h1>
      <p style="color:var(--text-muted);margin-bottom:24px">Upload your documents on the main page first, then come back here to edit schedules.</p>
      <a href="index.html" class="btn-back-link">Go to Main Page</a>
    </div>`;
} else {
  let activeSchedule = 'C';
  let result = safeCompute(STATE.taxData);

  function setSchedule(sched) {
    activeSchedule = sched;
    renderSchedules();
  }

  function saveAndRecalculate() {
    result = safeCompute(STATE.taxData);
    saveTaxData();

    // Payment gate — each save counts as a question
    const saveKey = 'sched_save_' + activeSchedule + '_' + Date.now();
    if (!STATE.answeredQs.has('sched_' + activeSchedule)) {
      if (PAID_QUESTIONS <= 0 && STRIPE_PAYMENT_LINKS.per_question) {
        saveTaxData();
        localStorage.setItem('rmt_pending_question', 'sched_' + activeSchedule);
        window.location.href = STRIPE_PAYMENT_LINKS.per_question;
        return;
      }
      if (PAID_QUESTIONS > 0) {
        PAID_QUESTIONS--;
        try {
          const payment = JSON.parse(localStorage.getItem('rmt_payment') || '{}');
          payment.usedQuestions = (payment.usedQuestions || 0) + 1;
          localStorage.setItem('rmt_payment', JSON.stringify(payment));
        } catch(e) { rlog('PAYMENT_UPDATE_ERROR', e.message); }
      }
      STATE.answeredQs.add('sched_' + activeSchedule);
      saveAnswered();
    }

    showToast('Schedule saved — return recalculated', 'success');
    // Reset save button and live preview
    const saveBtn = document.querySelector('.btn-save');
    if (saveBtn) { delete saveBtn.dataset.original; saveBtn.textContent = 'Save & Recalculate'; saveBtn.style.background = 'var(--green)'; }
    const previewBox = document.getElementById('live-preview');
    if (previewBox) previewBox.style.display = 'none';
    renderSchedules();
  }

  function renderSchedules() {
    const d = STATE.taxData;
    const schedules = [];

    // Determine which schedules are relevant
    schedules.push('C');
    schedules.push('D', 'E', 'A', '8824');

    app.innerHTML = `
      <div class="container" style="max-width:800px;margin:0 auto;padding:20px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
          <div>
            <h1 style="color:var(--text);font-size:22px;font-weight:800;margin:0">Schedules & Forms</h1>
            <div style="color:var(--text-dim);font-size:12px;margin-top:4px">${APP_VERSION} · $5 per schedule edit</div>
          </div>
          <a href="index.html" class="btn-back-link" style="padding:8px 16px;font-size:13px">← Back to Return</a>
        </div>

        ${result ? `
        <div style="margin-bottom:20px;padding:12px 16px;background:${result.refundOrOwed >= 0 ? 'rgba(34,197,94,0.08)' : 'rgba(239,68,68,0.08)'};border:1px solid ${result.refundOrOwed >= 0 ? 'var(--green-dark)' : 'var(--red-dark)'};border-radius:10px;display:flex;justify-content:space-between;align-items:center">
          <span style="color:var(--text-muted);font-size:13px">${result.refundOrOwed >= 0 ? 'Federal Refund' : 'Federal Amount Owed'}</span>
          <span style="color:${result.refundOrOwed >= 0 ? 'var(--green)' : 'var(--red)'};font-size:20px;font-weight:800">$${fmt(Math.abs(result.refundOrOwed))}</span>
        </div>
        ` : ''}

        <div class="sched-nav">
          <button class="sched-nav-btn ${activeSchedule==='C'?'active':''}" onclick="setSchedule('C')">Schedule C</button>
          <button class="sched-nav-btn ${activeSchedule==='D'?'active':''}" onclick="setSchedule('D')">Schedule D</button>
          <button class="sched-nav-btn ${activeSchedule==='E'?'active':''}" onclick="setSchedule('E')">Schedule E</button>
          <button class="sched-nav-btn ${activeSchedule==='A'?'active':''}" onclick="setSchedule('A')">Schedule A</button>
          <button class="sched-nav-btn ${activeSchedule==='8824'?'active':''}" onclick="setSchedule('8824')">Form 8824</button>
        </div>

        ${activeSchedule === 'C' ? renderScheduleC() : ''}
        ${activeSchedule === 'D' ? renderScheduleD() : ''}
        ${activeSchedule === 'E' ? renderScheduleE() : ''}
        ${activeSchedule === 'A' ? renderScheduleA() : ''}
        ${activeSchedule === '8824' ? renderForm8824() : ''}

        <div class="save-bar" style="flex-direction:column;gap:8px">
          <div id="live-preview" style="display:none;align-items:center;gap:8px;justify-content:center;flex-wrap:wrap"></div>
          <div style="display:flex;gap:12px;justify-content:center">
            <button class="btn-save" onclick="collectFormData(); saveAndRecalculate()">Save & Recalculate</button>
            <a href="index.html" class="btn-back-link">Back to Return</a>
          </div>
        </div>
      </div>
    `;
  }

  // ─── Schedule C ───────────────────────────────────────────
  function renderScheduleC() {
    const c = STATE.taxData.scheduleC || {};
    const net = result.schedules?.C ? result.schedules.C.netProfit : 0;
    return `
      <div class="sched-section active">
        <h2 style="color:var(--text);font-size:17px;font-weight:700;margin-bottom:4px">Schedule C — Profit or Loss from Business</h2>
        <p style="color:var(--text-dim);font-size:12px;margin-bottom:16px">Self-employment income and business expenses</p>

        <div class="form-grid">
          <div class="form-field"><label>Business name</label>
          <input type="text" id="sc-name" value="${esc(c.businessName||'')}" placeholder="Your Business LLC"></div>
          <div class="form-field"><label>Gross receipts / revenue</label>
          <input type="number" id="sc-gross" min="0" value="${c.grossReceipts||0}"></div>
          <div class="form-field"><label>Cost of goods sold</label>
          <input type="number" id="sc-cogs" min="0" value="${c.cogs||0}"></div>
        </div>

        <div style="color:var(--text-dim);font-size:12px;font-weight:600;margin:12px 0 8px">Business Expenses</div>
        <div class="form-grid">
          <div class="form-field"><label>Advertising</label><input type="number" id="sc-advertising" min="0" value="${c.advertising||0}"></div>
          <div class="form-field"><label>Car & truck expenses</label><input type="number" id="sc-car" min="0" value="${c.carExpense||0}"></div>
          <div class="form-field"><label>Insurance</label><input type="number" id="sc-insurance" min="0" value="${c.insurance||0}"></div>
          <div class="form-field"><label>Legal & professional</label><input type="number" id="sc-legal" min="0" value="${c.legalProfessional||0}"></div>
          <div class="form-field"><label>Office expense</label><input type="number" id="sc-office" min="0" value="${c.officeExpense||0}"></div>
          <div class="form-field"><label>Rent</label><input type="number" id="sc-rent" min="0" value="${c.rent||0}"></div>
          <div class="form-field"><label>Supplies</label><input type="number" id="sc-supplies" min="0" value="${c.supplies||0}"></div>
          <div class="form-field"><label>Travel</label><input type="number" id="sc-travel" min="0" value="${c.travel||0}"></div>
          <div class="form-field"><label>Meals (50% deductible)</label><input type="number" id="sc-meals" min="0" value="${c.meals||0}"></div>
          <div class="form-field"><label>Utilities</label><input type="number" id="sc-utilities" min="0" value="${c.utilities||0}"></div>
          <div class="form-field"><label>Other expenses</label><input type="number" id="sc-other" min="0" value="${c.otherExpenses||0}"></div>
        </div>

        ${result.schedules?.C ? `
        <div class="result-box">
          <div style="color:var(--accent-light);font-size:13px;font-weight:700;margin-bottom:8px">Schedule C Result</div>
          <div class="result-line"><span class="label">Gross income</span><span class="value">$${fmt(result.schedules.C.grossReceipts)}</span></div>
          <div class="result-line"><span class="label">Total expenses</span><span class="value">$${fmt(result.schedules.C.totalExpenses)}</span></div>
          <div class="result-line bold"><span class="label">Net profit</span><span class="value ${net >= 0 ? 'green' : 'red'}">$${fmt(Math.abs(net))}</span></div>
          ${result.schedules?.SE ? `<div class="result-line"><span class="label">SE tax (Schedule SE)</span><span class="value">$${fmt(result.schedules.SE.totalSETax)}</span></div>` : ''}
        </div>` : `
        <div class="result-box" style="text-align:center;color:var(--text-dim)">
          No Schedule C data yet — enter your business income above and click Save
        </div>`}
      </div>
    `;
  }

  // ─── Schedule D ───────────────────────────────────────────
  function renderScheduleD() {
    const gains = STATE.taxData.capitalGains || [];
    let rows = '';
    gains.forEach((t, i) => {
      rows += `
        <tr>
          <td><input type="text" class="cg-desc" value="${esc(t.description||'')}" style="width:100%;padding:4px;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:4px;font-size:12px;font-family:inherit"></td>
          <td><input type="date" class="cg-acquired" value="${t.dateAcquired||''}" style="padding:4px;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:4px;font-size:11px;font-family:inherit"></td>
          <td><input type="date" class="cg-sold" value="${t.dateSold||''}" style="padding:4px;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:4px;font-size:11px;font-family:inherit"></td>
          <td><input type="number" class="cg-proceeds" min="0" value="${t.proceeds||0}" style="width:90px;padding:4px;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:4px;font-size:12px;font-family:inherit;text-align:right"></td>
          <td><input type="number" class="cg-basis" min="0" value="${t.basis||0}" style="width:90px;padding:4px;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:4px;font-size:12px;font-family:inherit;text-align:right"></td>
          <td style="text-align:center"><input type="checkbox" class="cg-lt" ${t.longTerm ? 'checked' : ''}></td>
          <td><button class="remove-btn" onclick="removeCapGain(${i})">×</button></td>
        </tr>`;
    });

    return `
      <div class="sched-section active">
        <h2 style="color:var(--text);font-size:17px;font-weight:700;margin-bottom:4px">Schedule D — Capital Gains and Losses</h2>
        <p style="color:var(--text-dim);font-size:12px;margin-bottom:16px">Report sales of stocks, bonds, real estate, and other capital assets (Form 8949)</p>

        <div style="overflow-x:auto">
          <table style="width:100%;font-size:12px;border-collapse:collapse">
            <thead><tr style="border-bottom:1px solid var(--border)">
              <th style="text-align:left;padding:6px;color:var(--text-dim)">Description</th>
              <th style="text-align:left;padding:6px;color:var(--text-dim)">Acquired</th>
              <th style="text-align:left;padding:6px;color:var(--text-dim)">Sold</th>
              <th style="text-align:right;padding:6px;color:var(--text-dim)">Proceeds</th>
              <th style="text-align:right;padding:6px;color:var(--text-dim)">Basis</th>
              <th style="text-align:center;padding:6px;color:var(--text-dim)">LT</th>
              <th></th>
            </tr></thead>
            <tbody id="cg-rows">${rows}</tbody>
          </table>
        </div>
        <button class="add-row-btn" onclick="addCapGain()">+ Add transaction</button>

        ${result.schedules?.D ? `
        <div class="result-box">
          <div style="color:var(--accent-light);font-size:13px;font-weight:700;margin-bottom:8px">Schedule D Result</div>
          <div class="result-line"><span class="label">Net short-term gain/loss</span><span class="value">${moneyHtml(result.schedules.D.netSTCG, true)}</span></div>
          <div class="result-line"><span class="label">Net long-term gain/loss</span><span class="value">${moneyHtml(result.schedules.D.netLTCG, true)}</span></div>
          <div class="result-line bold"><span class="label">Total net gain/loss</span><span class="value">${moneyHtml(result.schedules.D.totalNetGain, true)}</span></div>
          ${result.schedules.D.capitalLossCarryover > 0 ? `<div class="result-line"><span class="label">Loss carryforward</span><span class="value">$${fmt(result.schedules.D.capitalLossCarryover)}</span></div>` : ''}
        </div>` : `
        <div class="result-box" style="text-align:center;color:var(--text-dim)">
          No capital gains data — add transactions above
        </div>`}
      </div>
    `;
  }

  function addCapGain() {
    if (!STATE.taxData.capitalGains) STATE.taxData.capitalGains = [];
    STATE.taxData.capitalGains.push({ description:'', dateAcquired:'', dateSold:'', proceeds:0, basis:0, longTerm:true });
    renderSchedules();
  }

  function removeCapGain(idx) {
    STATE.taxData.capitalGains.splice(idx, 1);
    renderSchedules();
  }

  // ─── Schedule E ───────────────────────────────────────────
  function renderScheduleE() {
    const props = STATE.taxData.scheduleE || [];
    let rows = '';
    props.forEach((p, i) => {
      rows += `
        <div style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:12px">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
            <span style="color:var(--accent-light);font-size:12px;font-weight:600">Property ${i+1}</span>
            <button class="remove-btn" onclick="removeProperty(${i})">× Remove</button>
          </div>
          <div class="form-grid">
            <div class="form-field"><label>Property address/name</label><input type="text" class="se-desc" value="${esc(p.description||'')}" placeholder="123 Main St"></div>
            <div class="form-field"><label>Gross rents received</label><input type="number" class="se-rents" min="0" value="${p.rents||0}"></div>
            <div class="form-field"><label>Mortgage interest</label><input type="number" class="se-mortgage" min="0" value="${p.mortgage||0}"></div>
            <div class="form-field"><label>Property taxes</label><input type="number" class="se-taxes" min="0" value="${p.taxes||0}"></div>
            <div class="form-field"><label>Insurance</label><input type="number" class="se-insurance" min="0" value="${p.insurance||0}"></div>
            <div class="form-field"><label>Repairs & maintenance</label><input type="number" class="se-repairs" min="0" value="${p.repairs||0}"></div>
            <div class="form-field"><label>Depreciation</label><input type="number" class="se-depreciation" min="0" value="${p.depreciation||0}"></div>
            <div class="form-field"><label>Utilities</label><input type="number" class="se-utilities" min="0" value="${p.utilities||0}"></div>
          </div>
        </div>`;
    });

    return `
      <div class="sched-section active">
        <h2 style="color:var(--text);font-size:17px;font-weight:700;margin-bottom:4px">Schedule E — Rental Income</h2>
        <p style="color:var(--text-dim);font-size:12px;margin-bottom:16px">Supplemental income from rental real estate, royalties, partnerships</p>
        ${rows || '<div style="color:var(--text-dim);font-size:13px;margin-bottom:12px">No rental properties yet</div>'}
        <button class="add-row-btn" onclick="addProperty()">+ Add rental property</button>

        ${result.schedules?.E ? `
        <div class="result-box">
          <div style="color:var(--accent-light);font-size:13px;font-weight:700;margin-bottom:8px">Schedule E Result</div>
          ${result.schedules.E.properties.map((p, i) => `
            <div class="result-line"><span class="label">${esc(p.description) || 'Property ' + (i+1)}</span><span class="value">${moneyHtml(p._netIncome, true)}</span></div>
          `).join('')}
          <div class="result-line bold"><span class="label">Total net rental income</span><span class="value">${moneyHtml(result.schedules.E.totalNet, true)}</span></div>
        </div>` : ''}
      </div>
    `;
  }

  function addProperty() {
    if (!STATE.taxData.scheduleE) STATE.taxData.scheduleE = [];
    STATE.taxData.scheduleE.push({ description:'', rents:0, mortgage:0, taxes:0, insurance:0, repairs:0, depreciation:0, utilities:0 });
    renderSchedules();
  }

  function removeProperty(idx) {
    STATE.taxData.scheduleE.splice(idx, 1);
    renderSchedules();
  }

  // ─── Schedule A ───────────────────────────────────────────
  function renderScheduleA() {
    const it = STATE.taxData.itemized || {};
    const fs = STATE.taxData.filingStatus || 'single';
    const stdDed = TAX.standardDeduction[fs];
    // Medical: only amount exceeding 7.5% of AGI is deductible
    const medicalFloor = (result.agi || 0) * 0.075;
    const deductibleMedical = Math.max(0, (it.medical||0) - medicalFloor);
    // SALT: include W-2 state withholding + state taxes + property taxes, capped
    const w2StateWithheld = (STATE.taxData.w2s || []).reduce((sum, w) => sum + (w.stateWithheld || 0), 0);
    const saltTotal = Math.min((it.stateTaxes||0) + w2StateWithheld + (it.propertyTaxes||0), TAX.saltCap[fs]);
    const totalItemized = deductibleMedical + saltTotal + (it.mortgageInterest||0) + (it.charitableCash||0) + (it.charitableNonCash||0);

    return `
      <div class="sched-section active">
        <h2 style="color:var(--text);font-size:17px;font-weight:700;margin-bottom:4px">Schedule A — Itemized Deductions</h2>
        <p style="color:var(--text-dim);font-size:12px;margin-bottom:16px">Compare itemized deductions vs. standard deduction ($${fmt(stdDed)})</p>

        <div class="form-grid">
          <div class="form-field"><label>Medical & dental expenses</label><input type="number" id="sa-medical" min="0" value="${it.medical||0}"></div>
          <div class="form-field"><label>State/local income taxes</label><input type="number" id="sa-state-taxes" min="0" value="${it.stateTaxes||0}"></div>
          <div class="form-field"><label>Real estate taxes</label><input type="number" id="sa-property-taxes" min="0" value="${it.propertyTaxes||0}"></div>
          <div class="form-field"><label>Home mortgage interest</label><input type="number" id="sa-mortgage" min="0" value="${it.mortgageInterest||0}"></div>
          <div class="form-field"><label>Charitable contributions (cash)</label><input type="number" id="sa-charity-cash" min="0" value="${it.charitableCash||0}"></div>
          <div class="form-field"><label>Charitable (non-cash)</label><input type="number" id="sa-charity-noncash" min="0" value="${it.charitableNonCash||0}"></div>
        </div>

        <div class="result-box">
          <div style="color:var(--accent-light);font-size:13px;font-weight:700;margin-bottom:8px">Deduction Comparison</div>
          <div class="result-line"><span class="label">Itemized total</span><span class="value">$${fmt(totalItemized)}</span></div>
          <div class="result-line"><span class="label">Standard deduction</span><span class="value">$${fmt(stdDed)}</span></div>
          <div class="result-line bold"><span class="label">Better option</span><span class="value ${totalItemized > stdDed ? 'green' : ''}">${totalItemized > stdDed ? 'Itemize (saves $' + fmt(totalItemized - stdDed) + ')' : 'Standard deduction'}</span></div>
        </div>
      </div>
    `;
  }

  // ─── Form 8824 ────────────────────────────────────────────
  function renderForm8824() {
    const ex = STATE.taxData.exchange1031 || {};
    const exResult = result.schedules?.form8824;

    return `
      <div class="sched-section active">
        <h2 style="color:var(--text);font-size:17px;font-weight:700;margin-bottom:4px">Form 8824 — Like-Kind Exchange (1031)</h2>
        <p style="color:var(--text-dim);font-size:12px;margin-bottom:16px">Defer capital gains tax on investment/business property exchanges</p>

        <div class="form-grid">
          <div class="form-field" style="grid-column:1/-1"><label>Property description</label>
          <input type="text" id="f8824-desc" value="${esc(ex.description||'')}" placeholder="e.g., Rental property at 456 Oak Ave"></div>
          <div class="form-field"><label>FMV of relinquished property</label><input type="number" id="f8824-rel-fmv" min="0" value="${ex.relinquishedFMV||0}"></div>
          <div class="form-field"><label>Adjusted basis of relinquished property</label><input type="number" id="f8824-rel-basis" min="0" value="${ex.relinquishedBasis||0}"></div>
          <div class="form-field"><label>FMV of replacement property</label><input type="number" id="f8824-rep-fmv" min="0" value="${ex.replacementFMV||0}"></div>
          <div class="form-field"><label>Boot received (cash/other)</label><input type="number" id="f8824-boot-rcvd" min="0" value="${ex.bootReceived||0}"></div>
          <div class="form-field"><label>Boot paid (additional cash in)</label><input type="number" id="f8824-boot-paid" min="0" value="${ex.bootPaid||0}"></div>
        </div>

        ${exResult ? `
        <div class="result-box">
          <div style="color:var(--accent-light);font-size:13px;font-weight:700;margin-bottom:8px">Form 8824 Result</div>
          <div class="result-line"><span class="label">Realized gain</span><span class="value">$${fmt(exResult.realizedGain)}</span></div>
          <div class="result-line"><span class="label">Recognized gain (taxable)</span><span class="value ${exResult.recognizedGain > 0 ? 'red' : ''}">${moneyHtml(exResult.recognizedGain, true)}</span></div>
          <div class="result-line bold"><span class="label">Deferred gain</span><span class="value green">$${fmt(exResult.deferredGain)}</span></div>
        </div>` : `
        <div class="result-box" style="text-align:center;color:var(--text-dim)">
          Enter exchange details above to see deferred gain calculation
        </div>`}
      </div>
    `;
  }

  // ─── Collect form data from active schedule ───────────────
  function collectFormData() {
    switch (activeSchedule) {
      case 'C': {
        STATE.taxData.scheduleC = {
          businessName: document.getElementById('sc-name')?.value || '',
          grossReceipts: parseFloat(document.getElementById('sc-gross')?.value) || 0,
          cogs: parseFloat(document.getElementById('sc-cogs')?.value) || 0,
          advertising: parseFloat(document.getElementById('sc-advertising')?.value) || 0,
          carExpense: parseFloat(document.getElementById('sc-car')?.value) || 0,
          insurance: parseFloat(document.getElementById('sc-insurance')?.value) || 0,
          legalProfessional: parseFloat(document.getElementById('sc-legal')?.value) || 0,
          officeExpense: parseFloat(document.getElementById('sc-office')?.value) || 0,
          rent: parseFloat(document.getElementById('sc-rent')?.value) || 0,
          supplies: parseFloat(document.getElementById('sc-supplies')?.value) || 0,
          travel: parseFloat(document.getElementById('sc-travel')?.value) || 0,
          meals: parseFloat(document.getElementById('sc-meals')?.value) || 0,
          utilities: parseFloat(document.getElementById('sc-utilities')?.value) || 0,
          otherExpenses: parseFloat(document.getElementById('sc-other')?.value) || 0,
        };
        break;
      }
      case 'D': {
        const descs = document.querySelectorAll('.cg-desc');
        const acquired = document.querySelectorAll('.cg-acquired');
        const sold = document.querySelectorAll('.cg-sold');
        const proceeds = document.querySelectorAll('.cg-proceeds');
        const basis = document.querySelectorAll('.cg-basis');
        const lt = document.querySelectorAll('.cg-lt');
        const gains = [];
        for (let i = 0; i < descs.length; i++) {
          const p = parseFloat(proceeds[i]?.value) || 0;
          const b = parseFloat(basis[i]?.value) || 0;
          if (descs[i]?.value || p > 0 || b > 0) {
            gains.push({
              description: descs[i]?.value || '',
              dateAcquired: acquired[i]?.value || '',
              dateSold: sold[i]?.value || '',
              proceeds: p, basis: b,
              longTerm: lt[i]?.checked || false,
            });
          }
        }
        STATE.taxData.capitalGains = gains;
        break;
      }
      case 'E': {
        const propDescs = document.querySelectorAll('.se-desc');
        const rents = document.querySelectorAll('.se-rents');
        const mortgages = document.querySelectorAll('.se-mortgage');
        const taxes = document.querySelectorAll('.se-taxes');
        const insurance = document.querySelectorAll('.se-insurance');
        const repairs = document.querySelectorAll('.se-repairs');
        const depreciation = document.querySelectorAll('.se-depreciation');
        const utilities = document.querySelectorAll('.se-utilities');
        const props = [];
        for (let i = 0; i < propDescs.length; i++) {
          props.push({
            description: propDescs[i]?.value || '',
            rents: parseFloat(rents[i]?.value) || 0,
            mortgage: parseFloat(mortgages[i]?.value) || 0,
            taxes: parseFloat(taxes[i]?.value) || 0,
            insurance: parseFloat(insurance[i]?.value) || 0,
            repairs: parseFloat(repairs[i]?.value) || 0,
            depreciation: parseFloat(depreciation[i]?.value) || 0,
            utilities: parseFloat(utilities[i]?.value) || 0,
          });
        }
        STATE.taxData.scheduleE = props.filter(p => p.rents > 0 || p.mortgage > 0 || p.description);
        break;
      }
      case 'A': {
        STATE.taxData.itemized = {
          medical: parseFloat(document.getElementById('sa-medical')?.value) || 0,
          stateTaxes: parseFloat(document.getElementById('sa-state-taxes')?.value) || 0,
          propertyTaxes: parseFloat(document.getElementById('sa-property-taxes')?.value) || 0,
          mortgageInterest: parseFloat(document.getElementById('sa-mortgage')?.value) || 0,
          charitableCash: parseFloat(document.getElementById('sa-charity-cash')?.value) || 0,
          charitableNonCash: parseFloat(document.getElementById('sa-charity-noncash')?.value) || 0,
        };
        // Only keep itemized if total exceeds standard deduction
        const total = Object.values(STATE.taxData.itemized).reduce((s,v) => s+v, 0);
        if (total === 0) delete STATE.taxData.itemized;
        break;
      }
      case '8824': {
        const rFMV = parseFloat(document.getElementById('f8824-rel-fmv')?.value) || 0;
        if (rFMV > 0) {
          STATE.taxData.exchange1031 = {
            description: document.getElementById('f8824-desc')?.value || '',
            relinquishedFMV: rFMV,
            relinquishedBasis: parseFloat(document.getElementById('f8824-rel-basis')?.value) || 0,
            replacementFMV: parseFloat(document.getElementById('f8824-rep-fmv')?.value) || 0,
            bootReceived: parseFloat(document.getElementById('f8824-boot-rcvd')?.value) || 0,
            bootPaid: parseFloat(document.getElementById('f8824-boot-paid')?.value) || 0,
          };
        } else {
          delete STATE.taxData.exchange1031;
        }
        break;
      }
    }
  }

  // Live preview: recalculate as user types (debounced)
  let _previewTimer = null;
  document.addEventListener('input', (e) => {
    if (e.target.closest('.form-field') || e.target.classList.contains('cg-desc') || e.target.classList.contains('cg-proceeds') || e.target.classList.contains('cg-basis')) {
      // Show "unsaved" indicator
      const saveBtn = document.querySelector('.btn-save');
      if (saveBtn && !saveBtn.dataset.original) {
        saveBtn.dataset.original = saveBtn.textContent;
        saveBtn.textContent = 'Save & Recalculate *';
        saveBtn.style.background = 'var(--orange)';
      }
      // Debounced live preview
      clearTimeout(_previewTimer);
      _previewTimer = setTimeout(() => {
        collectFormData();
        const preview = safeCompute(STATE.taxData);
        const previewBox = document.getElementById('live-preview');
        if (previewBox) {
          const diff = preview.refundOrOwed - result.refundOrOwed;
          previewBox.innerHTML = `
            <span style="color:var(--text-muted);font-size:12px">Live preview:</span>
            <span style="color:${preview.refundOrOwed >= 0 ? 'var(--green)' : 'var(--red)'};font-size:16px;font-weight:800">
              ${preview.refundOrOwed >= 0 ? 'Refund' : 'Owed'}: $${fmt(Math.abs(preview.refundOrOwed))}
            </span>
            ${diff !== 0 ? `<span style="color:${diff > 0 ? 'var(--green)' : 'var(--red)'};font-size:12px;font-weight:600">(${diff > 0 ? '+' : ''}$${fmt(diff)})</span>` : ''}
          `;
          previewBox.style.display = 'flex';
        }
      }, 400);
    }
  });

  // Initial render
  renderSchedules();
}
</script>
</body>
</html>
